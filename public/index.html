// Flatten into individual prompt items: each question + each sub = separate items
// item shape: { qId, type:"main"|"sub", subIdx?:number, text, tag, tagLabel, docs, sectionId }
function buildFlatItems(sections){
  const items=[];
  sections.forEach(sec=>{
    sec.questions.forEach(q=>{
      items.push({qId:q.id,type:"main",text:q.base,tag:q.tag,tagLabel:q.tagLabel,docs:q.docs,sectionId:sec.id,sectionTitle:sec.title});
      q.subs.forEach((s,i)=>{
        items.push({qId:q.id,type:"sub",subIdx:i,text:s,tag:q.tag,tagLabel:q.tagLabel,docs:q.docs,sectionId:sec.id,sectionTitle:sec.title});
      });
    });
  });
  return items;
}

// ─── SAFE JSON PARSE ───────────────────────────────────────────────────────
function safeJsonParse(text){
  if(!text||!text.trim()) throw new Error("Empty response");
  let s=text.replace(/```json/g,"").replace(/```/g,"").trim();
  const first=s.indexOf("{");
  const last=s.lastIndexOf("}");
  if(first===-1||last===-1) throw new Error("No JSON object found");
  s=s.substring(first,last+1);
  return JSON.parse(s);
}

// ─── API CALLS ─────────────────────────────────────────────────────────────
async function callClaude(prompt,max=900){
  const r=await fetch(CLAUDE_ENDPOINT,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content:prompt}]})
  });
  if(!r.ok) throw new Error(`Claude API error ${r.status}`);
  const d=await r.json();
  return(d.content?.map(b=>b.text||"").join("")||"").trim();
}

async function tailorQuestion(baseText,subs,industry,bizType,qNum){
  try{
    const txt=await callClaude(`Rewrite this procurement interview question for a ${industry} ${bizType} business. Keep same intent, make language specific to their trade. Return ONLY JSON: {"main":"...","subs":["...","..."]}
Q${qNum}: ${baseText}
Subs: ${subs.join(" | ")}`);
    const parsed=safeJsonParse(txt);
    if(!parsed.main||!Array.isArray(parsed.subs)) throw new Error("Bad shape");
    return parsed;
  }catch{return{main:baseText,subs};}
}

async function buildReport(answers,biz){
  // Serialize answers: answers[qId] = { main:"...", subs:["...","..."] }
  const lines=ALL_Q.map(q=>{
    const a=answers[q.id];
    if(!a) return null;
    let out=`Q${q.id} MAIN (${q.tagLabel}):\n${a.main||""}`;
    if(q.subs&&q.subs.length){
      q.subs.forEach((s,i)=>{
        out+=`\nQ${q.id} SUB ${i+1} — ${s}\n${(a.subs&&a.subs[i])||""}`;
      });
    }
    return out;
  }).filter(Boolean).join("\n\n─────\n\n");

  const raw=await callClaude(`You are a procurement capability analyst for 915 Gypsy LLC. Analyze this small business interview.
Business: ${biz.name} | Industry: ${biz.industry} | Type: ${biz.bizType}
ANSWERS:\n${lines}
Return ONLY valid JSON:
{"canDo":[{"item":"...","evidence":"..."}],"cannotDo":[{"item":"...","reason":"..."}],"conditional":[{"item":"...","condition":"..."}],"flags":[{"type":"gap|risk|opportunity","description":"..."}],"proposalReadiness":{"score":5,"summary":"2-3 sentence assessment"},"tileMapping":[{"tile":"...","status":"ready|needs work|missing","note":"..."}]}
tileMapping must include all 16: Corporate Documents, Capability Statement, Insurance, OSHA & Safety, Past Performance, Pricing, Project Portfolio, Compliance, Equipment & Fleet, Crew Qualifications, Financial Readiness, Bid Documents, Subcontractor Network, QA/QC Plan, Scheduling, AI & Technology`,1800);
  return safeJsonParse(raw);
}

async function submitToAirtable(biz,social,answers,report){
  const secAnswers={};
  SECTIONS.forEach(sec=>{
    const key=SEC_FIELD[sec.id];
    const lines=sec.questions.map(q=>{
      const a=answers[q.id];
      if(!a) return null;
      let out=`Q${q.id} — ${q.base}\nMAIN: ${a.main||""}`;
      q.subs.forEach((s,i)=>{
        out+=`\nSUB ${i+1}: ${s}\n${(a.subs&&a.subs[i])||""}`;
      });
      return out;
    }).filter(Boolean);
    if(lines.length) secAnswers[key]=lines.join("\n\n─────\n\n");
  });

  const fields={
    [AT_FIELDS.name]:biz.name,
    [AT_FIELDS.industry]:biz.industry,
    [AT_FIELDS.bizType]:biz.bizType,
    [AT_FIELDS.date]:new Date().toISOString().split("T")[0],
    [AT_FIELDS.score]:report.proposalReadiness?.score||0,
    [AT_FIELDS.canDo]:report.canDo?.map(c=>`✅ ${c.item}\n${c.evidence}`).join("\n\n")||"",
    [AT_FIELDS.cannotDo]:report.cannotDo?.map(c=>`🚫 ${c.item}\n${c.reason}`).join("\n\n")||"",
    [AT_FIELDS.conditional]:report.conditional?.map(c=>`⚠️ ${c.item}\nOnly if: ${c.condition}`).join("\n\n")||"",
    [AT_FIELDS.flags]:report.flags?.map(f=>`[${f.type.toUpperCase()}] ${f.description}`).join("\n\n")||"",
    [AT_FIELDS.tiles]:report.tileMapping?.map(t=>`${(t.status||"").toUpperCase()} — ${t.tile}: ${t.note}`).join("\n")||"",
  };
  if(social.website) fields[AT_FIELDS.website]=social.website;
  if(social.linkedin) fields[AT_FIELDS.linkedin]=social.linkedin;
  if(social.facebook) fields[AT_FIELDS.facebook]=social.facebook;
  if(social.instagram) fields[AT_FIELDS.instagram]=social.instagram;
  if(social.tiktok) fields[AT_FIELDS.tiktok]=social.tiktok;
  if(social.youtube) fields[AT_FIELDS.youtube]=social.youtube;
  if(social.other) fields[AT_FIELDS.other]=social.other;
  Object.entries(secAnswers).forEach(([key,val])=>{fields[AT_FIELDS[key]]=val;});

  const res=await fetch(AIRTABLE_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({baseId:AT_BASE,tableId:AT_TABLE,fields})
  });
  return res.ok;
}

// ─── VOICE HOOK ────────────────────────────────────────────────────────────
function useVoice(onFinal){
  const[on,setOn]=useState(false);
  const[interim,setInterim]=useState("");
  const ref=useRef(null);
  const supported=typeof window!=="undefined"&&!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  function start(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang="en-US";
    ref.current=r;
    r.onresult=e=>{
      let fin="",inter="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        e.results[i].isFinal?fin+=t+" ":inter+=t;
      }
      if(fin)onFinal(fin);
      setInterim(inter);
    };
    r.onend=()=>{setOn(false);setInterim("");};
    r.start();setOn(true);
  }
  function stop(){ref.current?.stop();setOn(false);setInterim("");}
  return{on,interim,start,stop,supported};
}

// ─── SINGLE QUESTION SCREEN ────────────────────────────────────────────────
function QuestionScreen({item,tailoredText,value,onChange,onNext,onBack,onPause,itemIdx,total,biz}){
  const textRef=useRef(value||"");
  const[tooShort,setTooShort]=useState(false);
  const[prompts,setPrompts]=useState([]);
  const[loadingPrompts,setLoadingPrompts]=useState(false);
  const[showType,setShowType]=useState(false);

  const displayText=tailoredText||item.text;
  const has=(value||"").trim().length>0;
  const pct=Math.round(((itemIdx+1)/total)*100);
  const isLast=itemIdx===total-1;
  const isSubQ=item.type==="sub";

  const{on,interim,start,stop,supported}=useVoice(t=>{
    textRef.current=(textRef.current+" "+t).trim();
    onChange(textRef.current);
  });

  useEffect(()=>{textRef.current=value||"";},[value]);

  function handleNext(){
    if(isTooShort(value)){setTooShort(true);return;}
    setTooShort(false);
    onNext();
  }

  async function askAiPrompts(){
    setLoadingPrompts(true);
    try{
      const txt=await callClaude(`Generate 3 follow-up prompts to help a ${biz?.industry||"business owner"} give a more detailed answer to this question:\n"${displayText}"\nReturn ONLY a JSON array of 3 strings: ["...","...","..."]`,400);
      const cleaned=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      const first=cleaned.indexOf("[");const last=cleaned.lastIndexOf("]");
      const arr=JSON.parse(cleaned.substring(first,last+1));
      setPrompts(arr);
    }catch{
      setPrompts(["What specific examples can you share?","Can you include numbers, timeframes, or names?","What would you tell a new client about this?"]);
    }
    setLoadingPrompts(false);
  }

  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header bizName={biz?.name}/>
      <div style={{flex:1,padding:"28px 16px",maxWidth:680,margin:"0 auto",width:"100%"}}>
        {/* Progress */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",color:B.gold,fontSize:12,marginBottom:6,fontWeight:600}}>
            <span>{item.sectionTitle}</span>
            <span>Prompt {itemIdx+1} of {total} · {pct}%</span>
          </div>
          <div style={{background:B.mid,borderRadius:99,height:6}}>
            <div style={{background:B.rust,width:`${pct}%`,height:6,borderRadius:99,transition:"width .4s"}}/>
          </div>
        </div>

        <div style={cardS}>
          {/* Tag + type badge */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:18}}>{item.tag}</span>
            <span style={{fontSize:11,fontWeight:800,letterSpacing:1,color:B.gold,textTransform:"uppercase"}}>{item.tagLabel}</span>
            {isSubQ&&(
              <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:99,background:B.mid,color:B.rust,border:`1px solid ${B.rust}`}}>Follow-Up Question</span>
            )}
          </div>

          {/* Question text */}
          <h2 style={{color:B.sand,fontSize:19,fontWeight:900,lineHeight:1.55,margin:"0 0 20px"}}>{displayText}</h2>

          {/* Voice controls */}
          <div style={{textAlign:"center",marginBottom:20}}>
            {on?(
              <div>
                <div style={{position:"relative",width:80,height:80,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{position:"absolute",width:80,height:80,borderRadius:"50%",background:`${B.rust}22`,animation:"pulse 1.5s ease-out infinite"}}/>
                  <div style={{position:"absolute",width:60,height:60,borderRadius:"50%",background:`${B.rust}33`,animation:"pulse 1.5s ease-out .35s infinite"}}/>
                  <div style={{width:48,height:48,borderRadius:"50%",background:B.rust,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,fontSize:22}}>🎙️</div>
                </div>
                <p style={{color:B.rust,fontWeight:800,fontSize:13,margin:"0 0 6px"}}>Listening… speak naturally</p>
                {interim&&<p style={{color:B.gold,fontSize:12,fontStyle:"italic",maxWidth:400,margin:"0 auto 10px",lineHeight:1.5}}>{interim}</p>}
                <button onClick={stop} style={{padding:"8px 24px",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:99,fontWeight:700,fontSize:13,cursor:"pointer"}}>⏹ Stop Recording</button>
              </div>
            ):(
              <div>
                {supported?(
                  <button onClick={start} style={{padding:"14px 40px",background:has?B.mid:B.rust,color:has?B.rust:B.white,border:has?`2px solid ${B.rust}`:"none",borderRadius:99,fontWeight:900,fontSize:16,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:10}}>
                    🎙️ {has?"Add More":"Tap to Speak"}
                  </button>
                ):(
                  <p style={{color:B.gold,fontSize:13}}>⚠️ Voice not supported in this browser — please type below.</p>
                )}
                <div style={{marginTop:8}}>
                  <button onClick={()=>setShowType(!showType)} style={{background:"none",border:"none",color:B.border,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
                    {showType?"Hide keyboard":"Prefer to type?"}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Text area */}
          {(showType||has)&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:B.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{has?"Your response (edit if needed):":"Type your answer:"}</div>
              <textarea
                style={{width:"100%",minHeight:120,background:B.mid,border:`1px solid ${tooShort?B.rust:B.border}`,borderRadius:8,padding:12,fontSize:14,fontFamily:"inherit",color:B.sand,resize:"vertical",boxSizing:"border-box",lineHeight:1.7}}
                placeholder="Speak or type here…"
                value={value||""}
                onChange={e=>{textRef.current=e.target.value;onChange(e.target.value);setTooShort(false);}}
              />
              <div style={{fontSize:11,color:(value||"").trim().length>=MIN_CHARS?B.gold:B.border,marginTop:3,textAlign:"right"}}>
                {(value||"").trim().length} / {MIN_CHARS} characters minimum
              </div>
            </div>
          )}

          {/* Tell me more warning */}
          {tooShort&&(
            <div style={{background:"#3a0a0a",border:`1px solid ${B.rust}`,borderRadius:8,padding:12,marginBottom:14}}>
              <div style={{color:B.rust,fontWeight:800,fontSize:13,marginBottom:4}}>⚠️ Tell me more — include specifics (numbers, roles, tools, examples).</div>
              <div style={{color:B.sand,fontSize:12,marginBottom:8}}>We need at least {MIN_CHARS} characters to build an accurate proposal from your answer.</div>
              <button
                onClick={askAiPrompts}
                disabled={loadingPrompts}
                style={{padding:"6px 16px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontSize:12,fontWeight:700,cursor:loadingPrompts?"wait":"pointer"}}
              >
                {loadingPrompts?"Generating…":"🤖 Ask AI to prompt me"}
              </button>
              {prompts.length>0&&(
                <div style={{marginTop:10}}>
                  {prompts.map((p,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:6,color:B.sand,fontSize:13,lineHeight:1.6}}>
                      <span style={{color:B.rust,fontWeight:900,flexShrink:0}}>→</span><span>{p}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Navigation */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            {itemIdx>0&&(
              <button onClick={onBack} style={{flex:1,padding:"12px 0",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>← Back</button>
            )}
            <button onClick={onPause} style={{padding:"12px 18px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer"}}>⏸ Pause</button>
            <RBtn onClick={handleNext} style={{flex:2}}>{isLast?"Submit & Generate Report →":"Next →"}</RBtn>
          </div>

          {/* Proposal tiles */}
          <div style={{marginTop:16,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
            <div style={{fontSize:11,color:B.border,marginBottom:5}}>Feeds into proposal documents:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {item.docs.map(d=><span key={d} style={{background:B.mid,color:B.gold,fontSize:11,padding:"3px 10px",borderRadius:99,border:`1px solid ${B.border}`}}>{d}</span>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── REPORT ────────────────────────────────────────────────────────────────
function Report({report,biz,social,answers,submitted}){
  const[tab,setTab]=useState("summary");
  const score=report.proposalReadiness?.score||0;
  const scoreCol=score>=7?B.rust:score>=4?B.gold:"#dc2626";

  function copyReport(){
    let out=`915 GYPSY LLC — PROCUREMENT CAPABILITY DUMP™\n${"═".repeat(50)}\n`;
    out+=`Company: ${biz.name}\nIndustry: ${biz.industry}\nType: ${biz.bizType}\nDate: ${new Date().toLocaleDateString()}\n`;
    if(social.website)out+=`Website: ${social.website}\n`;
    out+=`Proposal Readiness Score: ${score}/10\n\nASSESSMENT\n${report.proposalReadiness?.summary}\n\n`;
    out+=`CAN DO\n${report.canDo?.map(c=>`• ${c.item}\n  ${c.evidence}`).join("\n\n")}\n\n`;
    out+=`CANNOT DO\n${report.cannotDo?.map(c=>`• ${c.item}\n  ${c.reason}`).join("\n\n")}\n\n`;
    out+=`CONDITIONAL\n${report.conditional?.map(c=>`• ${c.item}\n  Only if: ${c.condition}`).join("\n\n")}\n\n`;
    out+=`FLAGS\n${report.flags?.map(f=>`[${f.type.toUpperCase()}] ${f.description}`).join("\n")}\n\n`;
    out+=`TILE READINESS\n${report.tileMapping?.map(t=>`${(t.status||"").toUpperCase().padEnd(12)} ${t.tile}: ${t.note}`).join("\n")}\n\n`;
    out+=`FULL ANSWERS\n${"─".repeat(40)}\n`;
    SECTIONS.forEach(sec=>{
      out+=`\nSECTION ${sec.id}: ${sec.title.toUpperCase()}\n`;
      sec.questions.forEach(q=>{
        const a=answers[q.id];
        if(!a) return;
        out+=`\nQ${q.id}: ${q.base}\nMAIN: ${a.main||""}\n`;
        q.subs.forEach((s,i)=>{out+=`SUB ${i+1}: ${s}\n${(a.subs&&a.subs[i])||""}\n`;});
      });
    });
    out+=`\n© 915 Gypsy LLC · Procurement Capability Dump™ · All rights reserved`;
    navigator.clipboard.writeText(out).catch(()=>{});
    alert("Full report copied to clipboard!");
  }

  const tabs=["summary","capabilities","tiles","answers"];
  const tabLabel={summary:"📊 Summary",capabilities:"✅ Capabilities",tiles:"📁 Tile Readiness",answers:"📝 Full Answers"};

  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header bizName={biz.name}/>
      <div style={{flex:1,padding:"28px 16px",maxWidth:740,margin:"0 auto",width:"100%"}}>
        {submitted?(
          <div style={{background:"#1a3a0c",border:"1px solid #4a8a2a",borderRadius:10,padding:14,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>✅</span>
            <div>
              <div style={{color:"#8adf4a",fontWeight:800,fontSize:13}}>Successfully submitted to 915 Gypsy</div>
              <div style={{color:"#6ab52a",fontSize:12}}>Jesse will review your Capability Dump and be in touch.</div>
            </div>
          </div>
        ):(
          <div style={{background:B.mid,border:`1px solid ${B.gold}`,borderRadius:10,padding:14,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>⚠️</span>
            <div style={{color:B.gold,fontSize:13}}>Submission to 915 Gypsy could not be confirmed. Use the Copy Report button to save your results.</div>
          </div>
        )}
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:60,height:3,background:B.rust,margin:"0 auto 16px",borderRadius:2}}/>
          <h1 style={{color:B.sand,fontSize:22,fontWeight:900,margin:"0 0 6px"}}>Capability Summary Report</h1>
          <p style={{color:B.gold,fontSize:13,margin:"0 0 14px"}}>{biz.name} · {biz.industry} · {biz.bizType}</p>
          <div style={{display:"inline-block",background:B.card,border:`2px solid ${scoreCol}`,borderRadius:99,padding:"6px 28px",marginBottom:14}}>
            <span style={{fontSize:15,fontWeight:900,color:scoreCol}}>Proposal Readiness: {score}/10</span>
          </div>
          <div><button onClick={copyReport} style={{padding:"8px 22px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 Copy Full Report</button></div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
          {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",borderRadius:99,border:"1px solid",fontSize:13,fontWeight:700,cursor:"pointer",background:tab===t?B.rust:B.card,color:tab===t?B.white:B.gold,borderColor:tab===t?B.rust:B.border}}>{tabLabel[t]}</button>)}
        </div>

        {tab==="summary"&&(
          <div style={{display:"grid",gap:16}}>
            <div style={cardS}>
              <h3 style={{color:B.sand,fontWeight:800,fontSize:15,marginBottom:10}}>Assessment</h3>
              <p style={{color:B.gold,fontSize:14,lineHeight:1.8,margin:0}}>{report.proposalReadiness?.summary}</p>
            </div>
            {report.flags?.length>0&&(
              <div style={cardS}>
                <h3 style={{color:B.sand,fontWeight:800,fontSize:15,marginBottom:14}}>Flags & Findings</h3>
                {report.flags.map((f,i)=>(
                  <div key={i} style={{display:"flex",gap:10,marginBottom:10,padding:12,borderRadius:8,background:B.mid,borderLeft:`3px solid ${f.type==="risk"?"#dc2626":f.type==="gap"?B.gold:B.rust}`}}>
                    <span style={{fontSize:16}}>{f.type==="risk"?"🚨":f.type==="gap"?"⚠️":"💡"}</span>
                    <div>
                      <div style={{fontSize:11,fontWeight:800,textTransform:"uppercase",color:f.type==="risk"?"#dc2626":f.type==="gap"?B.gold:B.rust,marginBottom:3}}>{f.type}</div>
                      <p style={{margin:0,fontSize:13,color:B.sand,lineHeight:1.6}}>{f.description}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab==="capabilities"&&(
          <div style={{display:"grid",gap:16}}>
            {[
              {label:"✅ CAN DO",items:report.canDo,accent:B.rust,sub:c=>c.evidence},
              {label:"🚫 CANNOT DO",items:report.cannotDo,accent:"#dc2626",sub:c=>c.reason},
              {label:"⚠️ CONDITIONAL",items:report.conditional,accent:B.gold,sub:c=>`Only if: ${c.condition}`}
            ].map(({label,items,accent,sub})=>(
              <div key={label} style={{...cardS,borderLeft:`4px solid ${accent}`}}>
                <h3 style={{color:B.sand,fontWeight:900,marginBottom:14,fontSize:15}}>{label}</h3>
                {items?.length?items.map((c,i)=>(
                  <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<items.length-1?`1px solid ${B.border}`:"none"}}>
                    <div style={{fontWeight:800,color:B.sand,fontSize:14}}>{c.item}</div>
                    <div style={{color:B.gold,fontSize:13,marginTop:3,lineHeight:1.6}}>{sub(c)}</div>
                  </div>
                )):<div style={{color:B.border,fontSize:13}}>None identified</div>}
              </div>
            ))}
          </div>
        )}

        {tab==="tiles"&&(
          <div style={cardS}>
            <h3 style={{color:B.sand,fontWeight:800,fontSize:15,marginBottom:16}}>Proposal Tile Readiness</h3>
            {report.tileMapping?.map((t,i)=>{
              const c=t.status==="ready"?B.rust:t.status==="needs work"?B.gold:"#dc2626";
              return(
                <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 0",borderBottom:i<report.tileMapping.length-1?`1px solid ${B.border}`:"none"}}>
                  <span style={{fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:99,background:B.mid,color:c,border:`1px solid ${c}`,flexShrink:0,whiteSpace:"nowrap",marginTop:2}}>{(t.status||"").toUpperCase()}</span>
                  <div>
                    <div style={{fontWeight:800,fontSize:14,color:B.sand}}>{t.tile}</div>
                    <div style={{fontSize:13,color:B.gold,marginTop:2,lineHeight:1.5}}>{t.note}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="answers"&&(
          <div>
            {SECTIONS.map(sec=>(
              <div key={sec.id} style={{marginBottom:22}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{height:2,flex:1,background:B.rust,borderRadius:1}}/>
                  <h3 style={{fontSize:11,fontWeight:800,letterSpacing:1.5,color:B.rust,textTransform:"uppercase",margin:0,whiteSpace:"nowrap"}}>Section {sec.id}: {sec.title}</h3>
                  <div style={{height:2,flex:1,background:B.rust,borderRadius:1}}/>
                </div>
                {sec.questions.map(q=>{
                  const a=answers[q.id];
                  if(!a) return null;
                  return(
                    <div key={q.id} style={{...cardS,marginBottom:10}}>
                      <div style={{fontSize:11,color:B.border,marginBottom:4}}>{q.tag} Q{q.id} — {q.tagLabel}</div>
                      <div style={{fontWeight:700,fontSize:13,color:B.gold,marginBottom:6}}>{q.base}</div>
                      <div style={{fontSize:14,color:B.sand,lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:a.subs?.length?10:0}}>{a.main}</div>
                      {q.subs.map((s,i)=>(
                        <div key={i} style={{background:B.mid,borderRadius:8,padding:10,marginTop:8}}>
                          <div style={{fontSize:11,color:B.rust,fontWeight:800,marginBottom:4}}>→ {s}</div>
                          <div style={{fontSize:13,color:B.sand,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{(a.subs&&a.subs[i])||""}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:28,padding:14,background:B.card,borderRadius:10,border:`1px solid ${B.border}`,textAlign:"center"}}>
          <Logo size={28}/>
          <p style={{color:B.border,fontSize:11,margin:"8px 0 0"}}>© 915 Gypsy LLC · Procurement Capability Dump™ is a proprietary diagnostic tool · All rights reserved</p>
        </div>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────
function App(){
  const[stage,setStage]=useState("onboard");
  const[biz,setBiz]=useState(null);
  const[social,setSocial]=useState({});
  // tailored: { [qId]: { main:"", subs:["",""] } }
  const[tailored,setTailored]=useState({});
  // answers: { [qId]: { main:"", subs:["",""] } }
  const[answers,setAnswers]=useState({});
  // itemIdx: index into ALL_ITEMS flat array
  const[itemIdx,setItemIdx]=useState(0);
  const[report,setReport]=useState(null);
  const[submitted,setSubmitted]=useState(false);
  const[loadMsg,setLoadMsg]=useState("");
  const[savedSession,setSavedSession]=useState(null);

  // On mount, check for saved session
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(raw){
        const s=JSON.parse(raw);
        if(s.biz&&s.stage==="interview") setSavedSession(s);
      }
    }catch{}
  },[]);

  function saveSession(overrides={}){
    const s={stage,biz,social,tailored,answers,itemIdx,...overrides};
    try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch{}
  }

  function handleResume(){
    const s=savedSession;
    setBiz(s.biz);setSocial(s.social||{});setTailored(s.tailored||{});
    setAnswers(s.answers||{});setItemIdx(s.itemIdx||0);
    setSavedSession(null);setStage("interview");
  }

  async function handleStart(bizInfo,socialInfo){
    setBiz(bizInfo);setSocial(socialInfo);
    setStage("tailoring");
    setLoadMsg(`Tailoring your ${TOTAL} prompts for a ${bizInfo.industry} company…`);
    const result={};
    for(const q of ALL_Q){
      result[q.id]=await tailorQuestion(q.base,q.subs,bizInfo.industry,bizInfo.bizType,q.id);
    }
    setTailored(result);
    setStage("interview");
    localStorage.removeItem(LS_KEY);
  }

  // Get current value for this item from answers
  function getItemValue(item){
    const a=answers[item.qId];
    if(!a) return "";
    if(item.type==="main") return a.main||"";
    return (a.subs&&a.subs[item.subIdx])||"";
  }

  function setItemValue(item,val){
    setAnswers(prev=>{
      const a={...(prev[item.qId]||{main:"",subs:[]})};
      if(item.type==="main"){
        a.main=val;
      } else {
        const subs=[...(a.subs||[])];
        subs[item.subIdx]=val;
        a.subs=subs;
      }
      return {...prev,[item.qId]:a};
    });
  }

  function handlePause(){
    saveSession({stage:"interview",itemIdx,answers,tailored,biz,social});
    alert("Progress saved! You can close this tab and resume later.");
  }

  async function handleNext(){
    if(itemIdx<ALL_ITEMS.length-1){
      const nextIdx=itemIdx+1;
      setItemIdx(nextIdx);
      saveSession({itemIdx:nextIdx});
      return;
    }
    // Last item — generate report
    setStage("generating");
    setLoadMsg("Analyzing your responses and building your Capability Summary Report…");
    let r;
    try{
      r=await buildReport(answers,biz);
    }catch{
      r={
        canDo:[],cannotDo:[],conditional:[],
        flags:[{type:"gap",description:"Report generation encountered an error. Your answers have been captured — please use Copy Report to save them."}],
        proposalReadiness:{score:0,summary:"Report generation failed. Your raw answers are available in the Full Answers tab."},
        tileMapping:[{tile:"All Tiles",status:"needs work",note:"Manual review required"}]
      };
    }
    setReport(r);
    setLoadMsg("Submitting your report to 915 Gypsy…");
    let ok=false;
    try{ok=await submitToAirtable(biz,social,answers,r);}catch{}
    setSubmitted(ok);
    localStorage.removeItem(LS_KEY);
    setStage("report");
  }

  // Get tailored text for current item
  function getTailoredText(item){
    const t=tailored[item.qId];
    if(!t) return item.text;
    if(item.type==="main") return t.main||item.text;
    return (t.subs&&t.subs[item.subIdx])||item.text;
  }

  const curItem=ALL_ITEMS[itemIdx];

  if(stage==="onboard")return(
    <Onboarding
      onStart={handleStart}
      savedSession={savedSession}
      onResume={handleResume}
    />
  );
  if(stage==="tailoring"||stage==="generating")return <Loading msg={loadMsg}/>;
  if(stage==="interview"&&curItem)return(
    <QuestionScreen
      item={curItem}
      tailoredText={getTailoredText(curItem)}
      value={getItemValue(curItem)}
      onChange={val=>setItemValue(curItem,val)}
      onNext={handleNext}
      onBack={()=>setItemIdx(Math.max(0,itemIdx-1))}
      onPause={handlePause}
      itemIdx={itemIdx}
      total={TOTAL}
      biz={biz}
    />
  );
  if(stage==="report"&&report)return(
    <Report report={report} biz={biz} social={social} answers={answers} submitted={submitted}/>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

      });
    });
  });
  return items;
}

// ─── SAFE JSON PARSE ───────────────────────────────────────────────────────
function safeJsonParse(text){
  if(!text||!text.trim()) throw new Error("Empty response");
  let s=text.replace(/```json/g,"").replace(/```/g,"").trim();
  const first=s.indexOf("{");
  const last=s.lastIndexOf("}");
  if(first===-1||last===-1) throw new Error("No JSON object found");
  s=s.substring(first,last+1);
  return JSON.parse(s);
}

// ─── API CALLS ─────────────────────────────────────────────────────────────
async function callClaude(prompt,max=900){
  const r=await fetch(CLAUDE_ENDPOINT,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content:prompt}]})
  });
  if(!r.ok) throw new Error(`Claude API error ${r.status}`);
  const d=await r.json();
  return(d.content?.map(b=>b.text||"").join("")||"").trim();
}

async function tailorQuestion(baseText,subs,industry,bizType,qNum){
  try{
    const txt=await callClaude(`Rewrite this procurement interview question for a ${industry} ${bizType} business. Keep same intent, make language specific to their trade. Return ONLY JSON: {"main":"...","subs":["...","..."]}
Q${qNum}: ${baseText}
Subs: ${subs.join(" | ")}`);
    const parsed=safeJsonParse(txt);
    if(!parsed.main||!Array.isArray(parsed.subs)) throw new Error("Bad shape");
    return parsed;
  }catch{return{main:baseText,subs};}
}

async function buildReport(answers,biz){
  // Serialize answers: answers[qId] = { main:"...", subs:["...","..."] }
  const lines=ALL_Q.map(q=>{
    const a=answers[q.id];
    if(!a) return null;
    let out=`Q${q.id} MAIN (${q.tagLabel}):\n${a.main||""}`;
    if(q.subs&&q.subs.length){
      q.subs.forEach((s,i)=>{
        out+=`\nQ${q.id} SUB ${i+1} — ${s}\n${(a.subs&&a.subs[i])||""}`;
      });
    }
    return out;
  }).filter(Boolean).join("\n\n─────\n\n");

  const raw=await callClaude(`You are a procurement capability analyst for 915 Gypsy LLC. Analyze this small business interview.
Business: ${biz.name} | Industry: ${biz.industry} | Type: ${biz.bizType}
ANSWERS:\n${lines}
Return ONLY valid JSON:
{"canDo":[{"item":"...","evidence":"..."}],"cannotDo":[{"item":"...","reason":"..."}],"conditional":[{"item":"...","condition":"..."}],"flags":[{"type":"gap|risk|opportunity","description":"..."}],"proposalReadiness":{"score":5,"summary":"2-3 sentence assessment"},"tileMapping":[{"tile":"...","status":"ready|needs work|missing","note":"..."}]}
tileMapping must include all 16: Corporate Documents, Capability Statement, Insurance, OSHA & Safety, Past Performance, Pricing, Project Portfolio, Compliance, Equipment & Fleet, Crew Qualifications, Financial Readiness, Bid Documents, Subcontractor Network, QA/QC Plan, Scheduling, AI & Technology`,1800);
  return safeJsonParse(raw);
}

async function submitToAirtable(biz,social,answers,report){
  const secAnswers={};
  SECTIONS.forEach(sec=>{
    const key=SEC_FIELD[sec.id];
    const lines=sec.questions.map(q=>{
      const a=answers[q.id];
      if(!a) return null;
      let out=`Q${q.id} — ${q.base}\nMAIN: ${a.main||""}`;
      q.subs.forEach((s,i)=>{
        out+=`\nSUB ${i+1}: ${s}\n${(a.subs&&a.subs[i])||""}`;
      });
      return out;
    }).filter(Boolean);
    if(lines.length) secAnswers[key]=lines.join("\n\n─────\n\n");
  });

  const fields={
    [AT_FIELDS.name]:biz.name,
    [AT_FIELDS.industry]:biz.industry,
    [AT_FIELDS.bizType]:biz.bizType,
    [AT_FIELDS.date]:new Date().toISOString().split("T")[0],
    [AT_FIELDS.score]:report.proposalReadiness?.score||0,
    [AT_FIELDS.canDo]:report.canDo?.map(c=>`✅ ${c.item}\n${c.evidence}`).join("\n\n")||"",
    [AT_FIELDS.cannotDo]:report.cannotDo?.map(c=>`🚫 ${c.item}\n${c.reason}`).join("\n\n")||"",
    [AT_FIELDS.conditional]:report.conditional?.map(c=>`⚠️ ${c.item}\nOnly if: ${c.condition}`).join("\n\n")||"",
    [AT_FIELDS.flags]:report.flags?.map(f=>`[${f.type.toUpperCase()}] ${f.description}`).join("\n\n")||"",
    [AT_FIELDS.tiles]:report.tileMapping?.map(t=>`${(t.status||"").toUpperCase()} — ${t.tile}: ${t.note}`).join("\n")||"",
  };
  if(social.website) fields[AT_FIELDS.website]=social.website;
  if(social.linkedin) fields[AT_FIELDS.linkedin]=social.linkedin;
  if(social.facebook) fields[AT_FIELDS.facebook]=social.facebook;
  if(social.instagram) fields[AT_FIELDS.instagram]=social.instagram;
  if(social.tiktok) fields[AT_FIELDS.tiktok]=social.tiktok;
  if(social.youtube) fields[AT_FIELDS.youtube]=social.youtube;
  if(social.other) fields[AT_FIELDS.other]=social.other;
  Object.entries(secAnswers).forEach(([key,val])=>{fields[AT_FIELDS[key]]=val;});

  const res=await fetch(AIRTABLE_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({baseId:AT_BASE,tableId:AT_TABLE,fields})
  });
  return res.ok;
}

    r.onresult=e=>{
      let fin="",inter="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        e.results[i].isFinal?fin+=t+" ":inter+=t;
      }
      if(fin)onFinal(fin);
      setInterim(inter);
    };
    r.onend=()=>{setOn(false);setInterim("");};
    r.start();setOn(true);
  }
  function stop(){ref.current?.stop();setOn(false);setInterim("");}
  return{on,interim,start,stop,supported};
}

// ─── SINGLE QUESTION SCREEN ────────────────────────────────────────────────
function QuestionScreen({item,tailoredText,value,onChange,onNext,onBack,onPause,itemIdx,total,biz}){
  const textRef=useRef(value||"");
  const[tooShort,setTooShort]=useState(false);
  const[prompts,setPrompts]=useState([]);
  const[loadingPrompts,setLoadingPrompts]=useState(false);
  const[showType,setShowType]=useState(false);

  const displayText=tailoredText||item.text;
  const has=(value||"").trim().length>0;
  const pct=Math.round(((itemIdx+1)/total)*100);
  const isLast=itemIdx===total-1;
  const isSubQ=item.type==="sub";

  const{on,interim,start,stop,supported}=useVoice(t=>{
    textRef.current=(textRef.current+" "+t).trim();
    onChange(textRef.current);
  });

  useEffect(()=>{textRef.current=value||"";},[value]);

  function handleNext(){
    if(isTooShort(value)){setTooShort(true);return;}
    setTooShort(false);
    onNext();
  }

  async function askAiPrompts(){
    setLoadingPrompts(true);
    try{
      const txt=await callClaude(`Generate 3 follow-up prompts to help a ${biz?.industry||"business owner"} give a more detailed answer to this question:\n"${displayText}"\nReturn ONLY a JSON array of 3 strings: ["...","...","..."]`,400);
      const cleaned=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      const first=cleaned.indexOf("[");const last=cleaned.lastIndexOf("]");
      const arr=JSON.parse(cleaned.substring(first,last+1));
      setPrompts(arr);
    }catch{
      setPrompts(["What specific examples can you share?","Can you include numbers, timeframes, or names?","What would you tell a new client about this?"]);
    }
    setLoadingPrompts(false);
  }

  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header bizName={biz?.name}/>
      <div style={{flex:1,padding:"28px 16px",maxWidth:680,margin:"0 auto",width:"100%"}}>
        {/* Progress */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",color:B.gold,fontSize:12,marginBottom:6,fontWeight:600}}>
            <span>{item.sectionTitle}</span>
            <span>Prompt {itemIdx+1} of {total} · {pct}%</span>
          </div>
          <div style={{background:B.mid,borderRadius:99,height:6}}>
            <div style={{background:B.rust,width:`${pct}%`,height:6,borderRadius:99,transition:"width .4s"}}/>
          </div>
        </div>

        <div style={cardS}>
          {/* Tag + type badge */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:18}}>{item.tag}</span>
            <span style={{fontSize:11,fontWeight:800,letterSpacing:1,color:B.gold,textTransform:"uppercase"}}>{item.tagLabel}</span>
            {isSubQ&&(
              <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:99,background:B.mid,color:B.rust,border:`1px solid ${B.rust}`}}>Follow-Up Question</span>
            )}
          </div>

          {/* Question text */}
          <h2 style={{color:B.sand,fontSize:19,fontWeight:900,lineHeight:1.55,margin:"0 0 20px"}}>{displayText}</h2>

          {/* Voice controls */}
          <div style={{textAlign:"center",marginBottom:20}}>
            {on?(
              <div>
                <div style={{position:"relative",width:80,height:80,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{position:"absolute",width:80,height:80,borderRadius:"50%",background:`${B.rust}22`,animation:"pulse 1.5s ease-out infinite"}}/>
                  <div style={{position:"absolute",width:60,height:60,borderRadius:"50%",background:`${B.rust}33`,animation:"pulse 1.5s ease-out .35s infinite"}}/>
                  <div style={{width:48,height:48,borderRadius:"50%",background:B.rust,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,fontSize:22}}>🎙️</div>
                </div>
                <p style={{color:B.rust,fontWeight:800,fontSize:13,margin:"0 0 6px"}}>Listening… speak naturally</p>
                {interim&&<p style={{color:B.gold,fontSize:12,fontStyle:"italic",maxWidth:400,margin:"0 auto 10px",lineHeight:1.5}}>{interim}</p>}
                <button onClick={stop} style={{padding:"8px 24px",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:99,fontWeight:700,fontSize:13,cursor:"pointer"}}>⏹ Stop Recording</button>
              </div>
            ):(
              <div>
                {supported?(
                  <button onClick={start} style={{padding:"14px 40px",background:has?B.mid:B.rust,color:has?B.rust:B.white,border:has?`2px solid ${B.rust}`:"none",borderRadius:99,fontWeight:900,fontSize:16,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:10}}>
                    🎙️ {has?"Add More":"Tap to Speak"}
                  </button>
                ):(
                  <p style={{color:B.gold,fontSize:13}}>⚠️ Voice not supported in this browser — please type below.</p>
                )}
                <div style={{marginTop:8}}>
                  <button onClick={()=>setShowType(!showType)} style={{background:"none",border:"none",color:B.border,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
                    {showType?"Hide keyboard":"Prefer to type?"}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Text area */}
          {(showType||has)&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:B.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{has?"Your response (edit if needed):":"Type your answer:"}</div>
              <textarea
                style={{width:"100%",minHeight:120,background:B.mid,border:`1px solid ${tooShort?B.rust:B.border}`,borderRadius:8,padding:12,fontSize:14,fontFamily:"inherit",color:B.sand,resize:"vertical",boxSizing:"border-box",lineHeight:1.7}}

                onChange={e=>{textRef.current=e.target.value;onChange(e.target.value);setTooShort(false);}}
              />
              <div style={{fontSize:11,color:(value||"").trim().length>=MIN_CHARS?B.gold:B.border,marginTop:3,textAlign:"right"}}>
                {(value||"").trim().length} / {MIN_CHARS} characters minimum
              </div>
            </div>
          )}

          {/* Tell me more warning */}
          {tooShort&&(
            <div style={{background:"#3a0a0a",border:`1px solid ${B.rust}`,borderRadius:8,padding:12,marginBottom:14}}>
              <div style={{color:B.rust,fontWeight:800,fontSize:13,marginBottom:4}}>⚠️ Tell me more — include specifics (numbers, roles, tools, examples).</div>
              <div style={{color:B.sand,fontSize:12,marginBottom:8}}>We need at least {MIN_CHARS} characters to build an accurate proposal from your answer.</div>
              <button
                onClick={askAiPrompts}
                disabled={loadingPrompts}
                style={{padding:"6px 16px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontSize:12,fontWeight:700,cursor:loadingPrompts?"wait":"pointer"}}
              >
                {loadingPrompts?"Generating…":"🤖 Ask AI to prompt me"}
              </button>
              {prompts.length>0&&(
                <div style={{marginTop:10}}>
                  {prompts.map((p,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:6,color:B.sand,fontSize:13,lineHeight:1.6}}>
                      <span style={{color:B.rust,fontWeight:900,flexShrink:0}}>→</span><span>{p}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Navigation */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            {itemIdx>0&&(
              <button onClick={onBack} style={{flex:1,padding:"12px 0",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>← Back</button>
            )}
            <button onClick={onPause} style={{padding:"12px 18px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer"}}>⏸ Pause</button>
            <RBtn onClick={handleNext} style={{flex:2}}>{isLast?"Submit & Generate Report →":"Next →"}</RBtn>
          </div>

          {/* Proposal tiles */}
          <div style={{marginTop:16,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
            <div style={{fontSize:11,color:B.border,marginBottom:5}}>Feeds into proposal documents:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {item.docs.map(d=><span key={d} style={{background:B.mid,color:B.gold,fontSize:11,padding:"3px 10px",borderRadius:99,border:`1px solid ${B.border}`}}>{d}</span>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Report({report,biz,social,answers,submitted}){

  function copyReport(){
    let out=`915 GYPSY LLC — PROCUREMENT CAPABILITY DUMP™\n${"═".repeat(50)}\n`;
    out+=`Company: ${biz.name}\nIndustry: ${biz.industry}\nType: ${biz.bizType}\nDate: ${new Date().toLocaleDateString()}\n`;
    if(social.website)out+=`Website: ${social.website}\n`;
    out+=`Proposal Readiness Score: ${score}/10\n\nASSESSMENT\n${report.proposalReadiness?.summary}\n\n`;
    out+=`CAN DO\n${report.canDo?.map(c=>`• ${c.item}\n  ${c.evidence}`).join("\n\n")}\n\n`;
    out+=`CANNOT DO\n${report.cannotDo?.map(c=>`• ${c.item}\n  ${c.reason}`).join("\n\n")}\n\n`;
    out+=`CONDITIONAL\n${report.conditional?.map(c=>`• ${c.item}\n  Only if: ${c.condition}`).join("\n\n")}\n\n`;
    out+=`FLAGS\n${report.flags?.map(f=>`[${f.type.toUpperCase()}] ${f.description}`).join("\n")}\n\n`;
    out+=`TILE READINESS\n${report.tileMapping?.map(t=>`${(t.status||"").toUpperCase().padEnd(12)} ${t.tile}: ${t.note}`).join("\n")}\n\n`;
    out+=`FULL ANSWERS\n${"─".repeat(40)}\n`;
    SECTIONS.forEach(sec=>{
      out+=`\nSECTION ${sec.id}: ${sec.title.toUpperCase()}\n`;
      sec.questions.forEach(q=>{
        const a=answers[q.id];
        if(!a) return;
        out+=`\nQ${q.id}: ${q.base}\nMAIN: ${a.main||""}\n`;
        q.subs.forEach((s,i)=>{out+=`SUB ${i+1}: ${s}\n${(a.subs&&a.subs[i])||""}\n`;});
      });
    });
    out+=`\n© 915 Gypsy LLC · Procurement Capability Dump™ · All rights reserved`;
    navigator.clipboard.writeText(out).catch(()=>{});
    alert("Full report copied to clipboard!");

  const tabs=["summary","capabilities","tiles","answers"];

              <div style={{color:"#8adf4a",fontWeight:800,fontSize:13}}>Successfully submitted to 915 Gypsy</div>

            </div>
          </div>
        ):(
          <div style={{background:B.mid,border:`1px solid ${B.gold}`,borderRadius:10,padding:14,marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>⚠️</span>
            <div style={{color:B.gold,fontSize:13}}>Submission to 915 Gypsy could not be confirmed. Use the Copy Report button to save your results.</div>

        )}
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:60,height:3,background:B.rust,margin:"0 auto 16px",borderRadius:2}}/>
          <h1 style={{color:B.sand,fontSize:22,fontWeight:900,margin:"0 0 6px"}}>Capability Summary Report</h1>

            <span style={{fontSize:15,fontWeight:900,color:scoreCol}}>Proposal Readiness: {score}/10</span>
          </div>
          <div><button onClick={copyReport} style={{padding:"8px 22px",background:B.mid,color:B.gold,border:`1px solid ${B.gold}`,borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 Copy Full Report</button></div>

                    <div style={{color:B.gold,fontSize:13,marginTop:3,lineHeight:1.6}}>{sub(c)}</div>
                  </div>
                )):<div style={{color:B.border,fontSize:13}}>None identified</div>}
              </div>
            ))}
          </div>
        )}

        {tab==="tiles"&&(
          <div style={cardS}>

          <div>

              <div key={sec.id} style={{marginBottom:22}}>

// ─── LOADING SCREEN ────────────────────────────────────────────────────────
function Loading({msg}){
  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header/>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
        <div style={{width:44,height:44,border:`4px solid ${B.border}`,borderTop:`4px solid ${B.rust}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <p style={{color:B.sand,fontSize:15,textAlign:"center",maxWidth:340,lineHeight:1.8}}>{msg}</p>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────
function App(){
  const[stage,setStage]=useState("onboard");
  const[biz,setBiz]=useState(null);
  const[social,setSocial]=useState({});
  // tailored: { [qId]: { main:"", subs:["",""] } }
  const[tailored,setTailored]=useState({});
  // answers: { [qId]: { main:"", subs:["",""] } }
  const[answers,setAnswers]=useState({});
  // itemIdx: index into ALL_ITEMS flat array
  const[itemIdx,setItemIdx]=useState(0);
  const[report,setReport]=useState(null);
  const[submitted,setSubmitted]=useState(false);
  const[loadMsg,setLoadMsg]=useState("");
  const[savedSession,setSavedSession]=useState(null);

  // On mount, check for saved session
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(raw){
        const s=JSON.parse(raw);
        if(s.biz&&s.stage==="interview") setSavedSession(s);
      }
    }catch{}
  },[]);

  function saveSession(overrides={}){
    const s={stage,biz,social,tailored,answers,itemIdx,...overrides};
    try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch{}
  }

  function handleResume(){
    const s=savedSession;
    setBiz(s.biz);setSocial(s.social||{});setTailored(s.tailored||{});
    setAnswers(s.answers||{});setItemIdx(s.itemIdx||0);
    setSavedSession(null);setStage("interview");
  }

  async function handleStart(bizInfo,socialInfo){
    setBiz(bizInfo);setSocial(socialInfo);
    setStage("tailoring");
    setLoadMsg(`Tailoring your ${TOTAL} prompts for a ${bizInfo.industry} company…`);
    const result={};
    for(const q of ALL_Q){
      result[q.id]=await tailorQuestion(q.base,q.subs,bizInfo.industry,bizInfo.bizType,q.id);
    }
    setTailored(result);
    setStage("interview");
    localStorage.removeItem(LS_KEY);
  }

  // Get current value for this item from answers
  function getItemValue(item){
    const a=answers[item.qId];
    if(!a) return "";
    if(item.type==="main") return a.main||"";
    return (a.subs&&a.subs[item.subIdx])||"";
  }

  function setItemValue(item,val){
    setAnswers(prev=>{
      const a={...(prev[item.qId]||{main:"",subs:[]})};
      if(item.type==="main"){
        a.main=val;
      } else {
        const subs=[...(a.subs||[])];
        subs[item.subIdx]=val;
        a.subs=subs;
      }
      return {...prev,[item.qId]:a};
    });
  }

  function handlePause(){
    saveSession({stage:"interview",itemIdx,answers,tailored,biz,social});
    alert("Progress saved! You can close this tab and resume later.");
  }

  async function handleNext(){
    if(itemIdx<ALL_ITEMS.length-1){
      const nextIdx=itemIdx+1;
      setItemIdx(nextIdx);
      saveSession({itemIdx:nextIdx});
      return;
    }
    // Last item — generate report
    setStage("generating");
    setLoadMsg("Analyzing your responses and building your Capability Summary Report…");
    let r;
    try{
      r=await buildReport(answers,biz);
    }catch{
      r={
        canDo:[],cannotDo:[],conditional:[],
        flags:[{type:"gap",description:"Report generation encountered an error. Your answers have been captured — please use Copy Report to save them."}],
        proposalReadiness:{score:0,summary:"Report generation failed. Your raw answers are available in the Full Answers tab."},
        tileMapping:[{tile:"All Tiles",status:"needs work",note:"Manual review required"}]
      };
    }
    setReport(r);
    setLoadMsg("Submitting your report to 915 Gypsy…");
    let ok=false;
    try{ok=await submitToAirtable(biz,social,answers,r);}catch{}
    setSubmitted(ok);
    localStorage.removeItem(LS_KEY);
    setStage("report");
  }

  // Get tailored text for current item
  function getTailoredText(item){
    const t=tailored[item.qId];
    if(!t) return item.text;
    if(item.type==="main") return t.main||item.text;
    return (t.subs&&t.subs[item.subIdx])||item.text;
  }

  const curItem=ALL_ITEMS[itemIdx];

  if(stage==="onboard")return(
    <Onboarding
      onStart={handleStart}
      savedSession={savedSession}
      onResume={handleResume}
    />
  );
  if(stage==="tailoring"||stage==="generating")return <Loading msg={loadMsg}/>;
  if(stage==="interview"&&curItem)return(
    <QuestionScreen
      item={curItem}
      tailoredText={getTailoredText(curItem)}
      value={getItemValue(curItem)}
      onChange={val=>setItemValue(curItem,val)}
      onNext={handleNext}
      onBack={()=>setItemIdx(Math.max(0,itemIdx-1))}
      onPause={handlePause}
      itemIdx={itemIdx}
      total={TOTAL}
      biz={biz}
    />
  );
  if(stage==="report"&&report)return(
    <Report report={report} biz={biz} social={social} answers={answers} submitted={submitted}/>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

  // as Netlify environment variables — never exposed to the browser.

  };
</script>

/* ============================================================

async function callClaude(prompt, maxTokens = 900) {
  // Calls our Netlify serverless function — no API key in the browser
  const response = await fetch(CFG.CLAUDE_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Claude API error: ${response.status}`);
  }

  const data = await response.json();
  return (data.content?.map(b => b.text || "").join("") || "")
    .replace(/```json|```/g, "").trim();
}
}
  
function safeJsonParse(maybeJsonText) {
  if (!maybeJsonText) throw new Error("Empty response from Claude");

  let t = String(maybeJsonText)
    .replace(/```json|```/g, "")
    .trim();

  const start = t.indexOf("{");
  const end = t.lastIndexOf("}");
  if (start === -1 || end === -1 || end <= start) {
    throw new Error("No JSON object found in Claude response");
  }

  t = t.slice(start, end + 1);
  return JSON.parse(t);
}

async function tailorQuestion(base, subs, industry, bizType, qNum) {
  try {
    const raw = await callClaude(
      `Rewrite this procurement interview question for a ${industry} ${bizType} business. ` +
      `Keep the same intent but use language specific to their trade and industry context. ` +
      `Return ONLY valid JSON — no extra text:\n` +
      `{"main":"rewritten question here","subs":["rewritten sub 1","rewritten sub 2"]}\n\n` +
      `Original Q${qNum}: ${base}\n` +
      `Original subs: ${subs.join(" | ")}`
    );
   const parsed = safeJsonParse(raw);
    if (parsed.main && Array.isArray(parsed.subs)) return parsed;
    return { main: base, subs };
  } catch {
    return { main: base, subs };
  }
}

async function submitToAirtable(biz, social, answers, report) {
  // Calls our Netlify serverless function — no API key in the browser
  const secAnswers = {};
  SECTIONS.forEach(sec => {
    const key = SEC_FIELD[sec.id];
    const lines = sec.questions
      .map(q => answers[q.id] ? `Q${q.id} — ${q.base}\n${answers[q.id]}` : null)
      .filter(Boolean);
    if (lines.length) secAnswers[key] = lines.join("\n\n─────\n\n");
  });

  const fields = {
    [AT_FIELDS.name]:        biz.name,
    [AT_FIELDS.industry]:    biz.industry,
    [AT_FIELDS.bizType]:     biz.bizType,
    [AT_FIELDS.date]:        new Date().toISOString().split("T")[0],
    [AT_FIELDS.score]:       report.proposalReadiness?.score || 0,
    [AT_FIELDS.canDo]:       report.canDo?.map(c => `✅ ${c.item}\n${c.evidence}`).join("\n\n") || "",
    [AT_FIELDS.cannotDo]:    report.cannotDo?.map(c => `🚫 ${c.item}\n${c.reason}`).join("\n\n") || "",
    [AT_FIELDS.conditional]: report.conditional?.map(c => `⚠️ ${c.item}\nOnly if: ${c.condition}`).join("\n\n") || "",
    [AT_FIELDS.flags]:       report.flags?.map(f => `[${f.type.toUpperCase()}] ${f.description}`).join("\n\n") || "",
    [AT_FIELDS.tiles]:       report.tileMapping?.map(t => `${(t.status||"").toUpperCase()} — ${t.tile}: ${t.note}`).join("\n") || "",
  };

  const socialFields = ["website","linkedin","facebook","instagram","tiktok","youtube","other"];
  socialFields.forEach(k => { if (social[k]) fields[AT_FIELDS[k]] = social[k]; });
  Object.entries(secAnswers).forEach(([key, val]) => { fields[AT_FIELDS[key]] = val; });

  const res = await fetch(CFG.AIRTABLE_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields })
  });

  return res.ok;
}

  const start = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = "en-US";
    recRef.current = rec;

    rec.onresult = e => {
      let final = "", inter = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t + " ") : (inter += t);
      }
      if (final) onFinal(final);
      setInterim(inter);
    };

    rec.onerror = e => { console.warn("Speech error:", e.error); stop(); };
    rec.onend = () => { setIsOn(false); setInterim(""); };
    rec.start();
    setIsOn(true);
  }, [onFinal]);

  const stop = useCallback(() => {
    recRef.current?.stop();
    setIsOn(false);
    setInterim("");
  }, []);

  return { isOn, interim, start, stop, supported };
}

/* ============================================================
   QUESTION SCREEN
   ============================================================ */
function QuestionScreen({ question, tailored, answer, onChange, onNext, onBack, qi, total }) {
  const q = tailored || { main: question.base, subs: question.subs };
  const [showTypeArea, setShowTypeArea] = useState(false);
  const textRef = useRef(answer || "");

  const { isOn, interim, start, stop, supported } = useVoice(transcript => {
    textRef.current = (textRef.current + " " + transcript).trim();
    onChange(textRef.current);
  });

  useEffect(() => { textRef.current = answer || ""; }, [answer]);

  const hasAnswer = (answer || "").trim().length > 0;
  const pct = Math.round(((qi + 1) / total) * 100);
  const section = SECTIONS.find(s => s.questions.some(sq => sq.id === question.id));

  return (
    <div className="page">
      <Header />
      <div className="content-wrap">
        {/* Progress */}
        <div className="progress-wrap">
          <div className="progress-meta">
            <span>{section?.title}</span>
            <span>Q{question.id} of {total} · {pct}%</span>
          </div>
          <div className="progress-track">
            <div className="progress-bar" style={{ width: `${pct}%` }} />
          </div>
        </div>

        <div className="card fade-up">
          {/* Tag */}
          <div className="q-header">
            <span className="q-tag-emoji">{question.tag}</span>
            <span className="q-tag-label">{question.tagLabel}</span>
          </div>

          {/* Main question */}
          <h2 className="q-title">{q.main}</h2>

          {/* Hints */}
          <div className="q-hints">
            <div className="q-hints__label">Think about:</div>
            {q.subs.map((s, i) => (
              <div key={i} className="q-hint-item">
                <span className="q-hint-arrow">→</span>
                <span>{s}</span>
              </div>
            ))}
          </div>

          {/* Voice recorder */}
          <div className="voice-center">
            {isOn ? (
              <div>
                <div className="pulse-ring">
                  <div className="pulse-ring__ring" />
                  <div className="pulse-ring__ring" />
                  <div className="pulse-ring__core">🎙️</div>
                </div>
                <p className="listening-label">Listening… speak naturally</p>
                {interim && <p className="interim-text">{interim}</p>}
                <button
                  className="btn btn--secondary btn--pill btn--sm"
                  onClick={stop}
                >
                  ⏹ Stop Recording
                </button>
              </div>
            ) : (
              <div>
                {supported ? (
                  <button
                    className={`mic-btn ${hasAnswer ? "mic-btn--has-answer" : "mic-btn--idle"}`}
                    onClick={start}
                  >
                    🎙️ {hasAnswer ? "Add More" : "Tap to Speak"}
                  </button>
                ) : (
                  <p style={{ color: "var(--gold)", fontSize: 13 }}>
                    ⚠️ Voice not supported in this browser — please type your answer below.
                  </p>
                )}
                <div className="type-toggle-wrap">
                  <button
                    style={{ background: "none", border: "none", color: "var(--border)", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}
                    onClick={() => setShowTypeArea(!showTypeArea)}
                  >
                    {showTypeArea ? "Hide keyboard" : "Prefer to type?"}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Text area */}
          {(showTypeArea || hasAnswer) && (
            <div style={{ marginBottom: 20 }}>
              <div className="q-response-label">
                {hasAnswer ? "Your response (edit if needed):" : "Type your answer:"}
              </div>
              <textarea
                className="textarea"
                placeholder="Speak or type here…"
                value={answer || ""}
                onChange={e => {
                  textRef.current = e.target.value;
                  onChange(e.target.value);
                }}
              />
            </div>
          )}

          {/* Navigation */}
          <div className="q-nav">
            {qi > 0 && (
              <button className="btn btn--secondary" onClick={onBack}>
                ← Back

            )}

              className="btn btn--primary"
              disabled={!hasAnswer}
              onClick={onNext}
              style={{ flex: qi > 0 ? undefined : "1 1 100%" }}
            >
              {qi === total - 1 ? "Submit & Generate Report →" : "Next Question →"}

          </div>

          {/* Doc tags */}
          <div className="doc-tags">
            <div className="doc-tags__label">Feeds into proposal documents:</div>
            <div className="doc-tags__list">
              {question.docs.map(d => (
                <span key={d} className="chip">{d}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function ReportScreen({ report, biz, social, answers, submitted }) {
  const [activeTab, setActiveTab] = useState("summary");
  const score = report.proposalReadiness?.score || 0;
  const scoreColor = score >= 7 ? "var(--rust)" : score >= 4 ? "var(--gold)" : "var(--danger)";

  function copyReport() {
    let out = `915 GYPSY LLC — PROCUREMENT CAPABILITY DUMP™\n${"═".repeat(52)}\n`;
    out += `Company: ${biz.name}\nIndustry: ${biz.industry}\nType: ${biz.bizType}\n`;
    out += `Date: ${new Date().toLocaleDateString()}\n`;
    if (social.website) out += `Website: ${social.website}\n`;
    out += `\nPROPOSAL READINESS SCORE: ${score}/10\n\n`;
    out += `ASSESSMENT\n${report.proposalReadiness?.summary}\n\n`;
    out += `CAN DO\n${report.canDo?.map(c => `• ${c.item}\n  ${c.evidence}`).join("\n\n")}\n\n`;
    out += `CANNOT DO\n${report.cannotDo?.map(c => `• ${c.item}\n  ${c.reason}`).join("\n\n")}\n\n`;
    out += `CONDITIONAL\n${report.conditional?.map(c => `• ${c.item}\n  Only if: ${c.condition}`).join("\n\n")}\n\n`;
    out += `FLAGS\n${report.flags?.map(f => `[${f.type.toUpperCase()}] ${f.description}`).join("\n")}\n\n`;
    out += `TILE READINESS\n${report.tileMapping?.map(t => `${(t.status||"").toUpperCase().padEnd(12)} ${t.tile}: ${t.note}`).join("\n")}\n\n`;
    out += `FULL ANSWERS\n${"─".repeat(44)}\n`;
    SECTIONS.forEach(sec => {
      out += `\nSECTION ${sec.id}: ${sec.title.toUpperCase()}\n`;
      sec.questions.forEach(q => {
        if (answers[q.id]) out += `\nQ${q.id}: ${q.base}\n${answers[q.id]}\n`;
      });
    });
    out += `\n${"═".repeat(52)}\n© 915 Gypsy LLC · Procurement Capability Dump™ · All rights reserved`;
    navigator.clipboard.writeText(out).catch(() => {});
    alert("Full report copied to clipboard!");
  }

  const tabs = [
    { id: "summary",      label: "📊 Summary" },
    { id: "capabilities", label: "✅ Capabilities" },
    { id: "tiles",        label: "📁 Tile Readiness" },
    { id: "answers",      label: "📝 Full Answers" },
  ];

  const tileStatusClass = s => {
    if (s === "ready")      return "badge--ready";
    if (s === "needs work") return "badge--needs";
    return "badge--missing";
  };

  const flagColor = type => {
    if (type === "risk")        return "var(--danger)";
    if (type === "gap")         return "var(--gold)";
    if (type === "opportunity") return "var(--rust)";
    return "var(--gold)";
  };

  const flagIcon = type => {
    if (type === "risk")        return "🚨";
    if (type === "gap")         return "⚠️";
    if (type === "opportunity") return "💡";
    return "📌";
  };

  return (
    <div className="page">
      <Header bizName={biz.name} />
      <div className="content-wrap content-wrap--wide">

        {/* Status banner */}
        {submitted ? (
          <div className="alert alert--success">
            <span className="alert__icon">✅</span>
            <div>
              <div className="alert__title">Successfully submitted to 915 Gypsy</div>
              <div className="alert__body">Jesse will review your Capability Dump and be in touch.</div>
            </div>
          </div>
        ) : (
          <div className="alert alert--warn">
            <span className="alert__icon">⚠️</span>
            <div className="alert__title">
              Use the Copy Report button below to save your results.
            </div>
          </div>
        )}

        {/* Report hero */}
        <div className="report-hero fade-up">
          <div style={{ width: 50, height: 3, background: "var(--rust)", margin: "0 auto 18px", borderRadius: 2 }} />
          <h1 className="report-title">Capability Summary Report</h1>
          <p className="report-meta">{biz.name} · {biz.industry} · {biz.bizType}</p>
          <div className="score-badge" style={{ border: `2px solid ${scoreColor}` }}>
            <span className="score-text" style={{ color: scoreColor }}>
              Proposal Readiness: {score}/10
            </span>
          </div>
          <div>
            <button className="btn btn--ghost btn--sm" onClick={copyReport}>
              📋 Copy Full Report
            </button>
          </div>
        </div>

        {/* Tabs */}
        <div className="report-tabs">
          {tabs.map(t => (
            <button
              key={t.id}
              className={`tab-btn ${activeTab === t.id ? "tab-btn--active" : "tab-btn--inactive"}`}
              onClick={() => setActiveTab(t.id)}
            >
              {t.label}
            </button>
          ))}
        </div>

        {/* TAB: Summary */}
        {activeTab === "summary" && (
          <div style={{ display: "grid", gap: 16 }}>
            <div className="card fade-up">
              <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Assessment</h3>
              <p style={{ color: "var(--gold)", fontSize: 14, lineHeight: 1.9, margin: 0 }}>
                {report.proposalReadiness?.summary}
              </p>
            </div>

            {report.flags?.length > 0 && (
              <div className="card fade-up" style={{ animationDelay: "0.1s" }}>
                <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 14 }}>Flags & Findings</h3>
                {report.flags.map((f, i) => (
                  <div key={i} className="flag-item" style={{ borderLeft: `3px solid ${flagColor(f.type)}` }}>
                    <span className="flag-item__icon">{flagIcon(f.type)}</span>

                      <div className="flag-item__type" style={{ color: flagColor(f.type) }}>{f.type}</div>
                      <p className="flag-item__desc">{f.description}</p>

        {/* TAB: Capabilities */}
        {activeTab === "capabilities" && (
          <div style={{ display: "grid", gap: 16 }}>
            {[
              { label: "✅ CAN DO",     items: report.canDo,       accent: "var(--rust)",   sub: c => c.evidence },
              { label: "🚫 CANNOT DO",  items: report.cannotDo,    accent: "var(--danger)", sub: c => c.reason },
              { label: "⚠️ CONDITIONAL",items: report.conditional, accent: "var(--gold)",   sub: c => `Only if: ${c.condition}` },
            ].map(({ label, items, accent, sub }) => (
              <div key={label} className="card" style={{ borderLeft: `4px solid ${accent}` }}>
                <h3 style={{ color: "var(--sand)", fontWeight: 900, fontSize: 15, marginBottom: 16 }}>{label}</h3>
                {items?.length ? items.map((c, i) => (
                  <div key={i} className="cap-item">
                    <div className="cap-item__title">{c.item}</div>
                    <div className="cap-item__sub">{sub(c)}</div>
                  </div>
                )) : (
                  <div style={{ color: "var(--border)", fontSize: 13 }}>None identified</div>
                )}
              </div>
            ))}

        )}

        {/* TAB: Tile Readiness */}
        {activeTab === "tiles" && (
          <div className="card fade-up">
            <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 18 }}>Proposal Tile Readiness</h3>
            {report.tileMapping?.map((t, i) => (
              <div key={i} className="tile-row">
                <span className={`badge ${tileStatusClass(t.status)}`} style={{ flexShrink: 0, marginTop: 2 }}>
                  {(t.status || "unknown").toUpperCase()}
                </span>
                <div>
                  <div className="tile-row__name">{t.tile}</div>
                  <div className="tile-row__note">{t.note}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TAB: Full Answers */}
        {activeTab === "answers" && (
          <div>
            {SECTIONS.map(sec => {
              const hasAnswers = sec.questions.some(q => answers[q.id]);
              if (!hasAnswers) return null;
              return (
                <div key={sec.id} style={{ marginBottom: 28 }}>
                  <div className="section-divider">
                    <div className="section-divider__line" />
                    <span className="section-divider__label">Section {sec.id}: {sec.title}</span>
                    <div className="section-divider__line" />
                  </div>
                  {sec.questions.map(q => answers[q.id] && (
                    <div key={q.id} className="card answer-card">
                      <div className="answer-card__meta">{q.tag} Q{q.id} — {q.tagLabel}</div>
                      <div className="answer-card__q">{q.base}</div>
                      <div className="answer-card__body">{answers[q.id]}</div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* Footer */}
        <div className="report-footer">
          <Logo size={30} />
          <p className="report-footer__copy">
            © 915 Gypsy LLC · Procurement Capability Dump™ is a proprietary diagnostic tool · All rights reserved
          </p>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP COMPONENT
   ============================================================ */
function App() {
  const [stage, setStage] = useState("onboard");
  const [biz, setBiz] = useState(null);
  const [social, setSocial] = useState({});
  const [tailored, setTailored] = useState({});
  const [answers, setAnswers] = useState({});
  const [qi, setQi] = useState(0);
  const [report, setReport] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [loadMsg, setLoadMsg] = useState("");

  async function handleStart(bizInfo, socialInfo) {
    setBiz(bizInfo);
    setSocial(socialInfo);
    setStage("tailoring");
    setLoadMsg(`Tailoring your ${ALL_Q.length} questions for a ${bizInfo.industry} company…`);

    const result = {};
    for (const q of ALL_Q) {
      result[q.id] = await tailorQuestion(q.base, q.subs, bizInfo.industry, bizInfo.bizType, q.id);
    }
    setTailored(result);
    setStage("interview");
  }

  async function handleNext() {
    if (qi < ALL_Q.length - 1) {
      setQi(qi + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    setStage("generating");
    setLoadMsg("Analyzing your responses and building your Capability Summary Report…");

    try {
      const r = await buildReport(answers, biz);
      setReport(r);

      setLoadMsg("Submitting your report to 915 Gypsy…");
      try {
        const ok = await submitToAirtable(biz, social, answers, r);
        setSubmitted(ok);
      } catch {
        setSubmitted(false);
      }

      setStage("report");
    } catch (err) {
      console.error("Report generation error:", err);
      setReport({
        canDo: [],
        cannotDo: [],
        conditional: [],
        flags: [{
          type: "gap",
          description: `Report generation failed: ${err.message || "Unknown error"}. Please copy your answers manually and contact 915 Gypsy.`
        }],
        proposalReadiness: { score: 0, summary: "Error generating report. Please contact 915 Gypsy with your answers." },
        tileMapping: []
      });
      setSubmitted(false);
      setStage("report");
    }
  }

  function handleBack() {
    if (qi > 0) {
      setQi(qi - 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  function handleAnswerChange(val) {
    setAnswers(prev => ({ ...prev, [ALL_Q[qi].id]: val }));
  }

  const curQ = ALL_Q[qi];

  switch (stage) {
    case "onboard":
      return <Onboarding onStart={handleStart} />;

    case "tailoring":
      return <LoadingScreen message={loadMsg} />;

    case "interview":
      return curQ ? (
        <QuestionScreen
          question={curQ}
          tailored={tailored[curQ.id]}
          answer={answers[curQ.id]}
          onChange={handleAnswerChange}
          onNext={handleNext}
          onBack={handleBack}
          qi={qi}
          total={ALL_Q.length}
        />
      ) : null;

    case "generating":
      return <LoadingScreen message={loadMsg} />;

    case "report":
      return report ? (
        <ReportScreen
          report={report}
          biz={biz}
          social={social}
          answers={answers}
          submitted={submitted}
        />
      ) : null;

    default:
      return null;
  }
}
