<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>915 Gypsy — Procurement Capability Dump™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

     ============================================================ -->

<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1E0A04;
  --bg2:       #2B0F06;
  --card:      #3a1a0c;
  --mid:       #4a2510;
  --border:    #6b3a1f;
  --rust:      #C4551C;
  --rust-dark: #9e4115;
  --sand:      #E6C88F;
  --gold:      #D4B072;
  --gold-dim:  #a8864e;
  --white:     #ffffff;
  --success:   #4a8a2a;
  --danger:    #dc2626;
  --warn:      #d97706;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--sand);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay on body */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

select option { background: var(--bg2); color: var(--sand); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--rust); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes pulse    { 0%   { transform: scale(1); opacity: 1; }
                      100% { transform: scale(2.4); opacity: 0; } }
@keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); }
                      to   { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
@keyframes shimmer  { 0%   { background-position: -200% center; }
                      100% { background-position: 200% center; } }
@keyframes blink    { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes barGrow  { from { width: 0; } to { width: var(--target-w); } }

.fade-up { animation: fadeUp 0.5s ease both; }

/* ============================================================
   UTILITY CLASSES
   ============================================================ */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); border: 0;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.content-wrap {
  flex: 1;
  padding: 32px 16px 48px;
  max-width: 700px;
  margin: 0 auto;
  width: 100%;
}

.content-wrap--wide {
  max-width: 820px;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  background: rgba(27, 8, 3, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--rust);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.header__divider {
  width: 1px;
  height: 30px;
  background: var(--border);
}

.header__title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sand);
}

.header__sub {
  font-size: 11px;
  color: var(--gold);
  margin-top: 1px;
}

.header__badge {
  margin-left: auto;
  font-size: 11px;
  color: var(--gold-dim);
  font-style: italic;
}

.logo-img {
  height: 40px;
  width: auto;
  object-fit: contain;
  display: block;
  flex-shrink: 0;
}

.logo-fallback {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--sand);
  flex-shrink: 0;
}

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
}

.card--accent-left {
  border-left: 4px solid var(--rust);
}

/* ============================================================
   FORMS
   ============================================================ */
.label {
  display: block;
  font-size: 11px;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 5px;
  margin-top: 16px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.input, .select, .textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--mid);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Barlow', sans-serif;
  color: var(--sand);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  box-sizing: border-box;
}

.input:focus, .select:focus, .textarea:focus {
  border-color: var(--rust);
  box-shadow: 0 0 0 3px rgba(196, 85, 28, 0.15);
}

.textarea {
  resize: vertical;
  min-height: 120px;
  line-height: 1.7;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-family: 'Barlow', sans-serif;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn--primary {
  background: var(--rust);
  color: var(--white);
}

.btn--primary:hover:not(:disabled) {
  background: var(--rust-dark);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(196, 85, 28, 0.35);
}

.btn--primary:disabled {
  background: var(--mid);
  color: #9a7060;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn--secondary {
  background: var(--mid);
  color: var(--sand);
  border: 1px solid var(--border);
}

.btn--secondary:hover {
  border-color: var(--rust);
  color: var(--rust);
}

.btn--ghost {
  background: none;
  border: 1px solid var(--border);
  color: var(--gold);
}

.btn--ghost:hover {
  border-color: var(--gold);
  color: var(--sand);
}

.btn--full { width: 100%; }

.btn--pill { border-radius: 99px; }

.btn--sm { padding: 7px 16px; font-size: 12px; }

/* ============================================================
   PROGRESS BAR
   ============================================================ */
.progress-wrap { margin-bottom: 20px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 7px;
}
.progress-track {
  background: var(--mid);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}
.progress-bar {
  background: linear-gradient(90deg, var(--rust-dark), var(--rust));
  height: 100%;
  border-radius: 99px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================================
   TAG CHIPS
   ============================================================ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--mid);
  color: var(--gold);
}

/* ============================================================
   STATUS BADGES
   ============================================================ */
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge--ready   { background: rgba(196,85,28,0.15); color: var(--rust);    border: 1px solid var(--rust); }
.badge--needs   { background: rgba(212,176,114,0.1); color: var(--gold);   border: 1px solid var(--gold); }
.badge--missing { background: rgba(220,38,38,0.1);  color: var(--danger);  border: 1px solid var(--danger); }

/* ============================================================
   ALERT BANNERS
   ============================================================ */
.alert {
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 20px;
}

.alert__icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.alert--success { background: rgba(74,138,42,0.12); border: 1px solid var(--success); }
.alert--success .alert__title { color: #8adf4a; font-weight: 800; font-size: 13px; margin-bottom: 2px; }
.alert--success .alert__body  { color: #6ab52a; }

.alert--warn { background: rgba(212,176,114,0.08); border: 1px solid var(--gold); }
.alert--warn .alert__title { color: var(--gold); font-weight: 800; font-size: 13px; }

.alert--info { background: rgba(196,85,28,0.08); border: 1px solid var(--rust); }
.alert--info .alert__title { color: var(--rust); font-weight: 800; font-size: 13px; margin-bottom: 4px; }
.alert--info .alert__body  { color: var(--sand); }

/* ============================================================
   VOICE RECORDER UI
   ============================================================ */
.voice-center { text-align: center; margin-bottom: 22px; }

.pulse-ring {
  position: relative;
  width: 88px;
  height: 88px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pulse-ring__ring {
  position: absolute;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: rgba(196, 85, 28, 0.2);
  animation: pulse 1.6s ease-out infinite;
}

.pulse-ring__ring:nth-child(2) {
  width: 66px;
  height: 66px;
  animation-delay: 0.4s;
}

.pulse-ring__core {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--rust);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 1;
  box-shadow: 0 0 24px rgba(196, 85, 28, 0.5);
}

.listening-label {
  color: var(--rust);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.interim-text {
  color: var(--gold);
  font-size: 13px;
  font-style: italic;
  max-width: 420px;
  margin: 0 auto 12px;
  line-height: 1.6;
  animation: blink 2s ease-in-out infinite;
}

.mic-btn {
  padding: 14px 44px;
  border-radius: 99px;
  border: none;
  font-family: 'Barlow', sans-serif;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all 0.25s;
}

.mic-btn--idle {
  background: var(--rust);
  color: var(--white);
  box-shadow: 0 4px 20px rgba(196, 85, 28, 0.3);
}

.mic-btn--idle:hover {
  background: var(--rust-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(196, 85, 28, 0.4);
}

.mic-btn--has-answer {
  background: var(--mid);
  color: var(--rust);
  border: 2px solid var(--rust);
}

.mic-btn--has-answer:hover {
  background: rgba(196,85,28,0.1);
}

/* ============================================================
   ONBOARDING HERO
   ============================================================ */
.hero {
  text-align: center;
  margin-bottom: 32px;
}

.hero__logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.hero__divider {
  width: 60px;
  height: 3px;
  background: var(--rust);
  margin: 0 auto 16px;
  border-radius: 2px;
}

.hero__title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 2px;
  color: var(--sand);
  margin-bottom: 10px;
  line-height: 1.1;
}

.hero__sub {
  color: var(--gold);
  font-size: 14px;
  line-height: 1.9;
  max-width: 480px;
  margin: 0 auto;
}

/* ============================================================
   SOCIAL LINKS SECTION
   ============================================================ */
.social-toggle {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--gold);
  border-radius: 8px;
  padding: 9px 16px;
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  margin-top: 20px;
  margin-bottom: 4px;
  transition: all 0.2s;
  text-align: left;
}

.social-toggle:hover { border-color: var(--gold); color: var(--sand); }

.social-panel {
  background: var(--mid);
  border-radius: 8px;
  padding: 16px;
  margin-top: 4px;
}

.social-hint {
  color: var(--gold);
  font-size: 12px;
  line-height: 1.7;
  margin-bottom: 12px;
}

/* ============================================================
   QUESTION SCREEN
   ============================================================ */
.q-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.q-tag-emoji { font-size: 20px; }

.q-tag-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}

.q-title {
  font-family: 'Barlow', sans-serif;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.5;
  color: var(--sand);
  margin-bottom: 18px;
}

.q-hints {
  background: var(--mid);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 24px;
  border-left: 3px solid var(--rust);
}

.q-hints__label {
  font-size: 10px;
  font-weight: 800;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

.q-hint-item {
  display: flex;
  gap: 10px;
  color: var(--sand);
  font-size: 13px;
  line-height: 1.65;
  margin-bottom: 7px;
}

.q-hint-item:last-child { margin-bottom: 0; }

.q-hint-arrow { color: var(--rust); font-weight: 900; flex-shrink: 0; }

.q-response-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold);
  margin-bottom: 7px;
}

.q-nav {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}

.q-nav .btn:first-child { flex: 1; }
.q-nav .btn:last-child  { flex: 2; }

.doc-tags {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.doc-tags__label { font-size: 11px; color: var(--border); margin-bottom: 7px; }

.doc-tags__list { display: flex; flex-wrap: wrap; gap: 5px; }

.type-toggle-wrap { margin-top: 10px; }

/* ============================================================
   LOADING SCREEN
   ============================================================ */
.loading-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 40px;
}

.spinner {
  width: 52px;
  height: 52px;
  border: 4px solid var(--border);
  border-top-color: var(--rust);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

.loading-msg {
  color: var(--sand);
  font-size: 15px;
  text-align: center;
  max-width: 380px;
  line-height: 1.9;
}

.loading-logo-wrap { opacity: 0.5; }

/* ============================================================
   REPORT SCREEN
   ============================================================ */
.report-hero { text-align: center; margin-bottom: 28px; }

.report-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 2px;
  color: var(--sand);
  margin-bottom: 6px;
}

.report-meta { color: var(--gold); font-size: 13px; margin-bottom: 16px; }

.score-badge {
  display: inline-block;
  background: var(--card);
  border-radius: 99px;
  padding: 8px 32px;
  margin-bottom: 16px;
}

.score-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 900;
}

.report-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}

.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn--active {
  background: var(--rust);
  color: var(--white);
  border-color: var(--rust);
}

.tab-btn--inactive {
  background: var(--card);
  color: var(--gold);
  border-color: var(--border);
}

.tab-btn--inactive:hover {
  border-color: var(--rust);
  color: var(--sand);
}

/* Capability cards */
.cap-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.cap-item:last-child { border-bottom: none; padding-bottom: 0; }

.cap-item__title { font-weight: 800; color: var(--sand); font-size: 14px; margin-bottom: 3px; }
.cap-item__sub   { color: var(--gold); font-size: 13px; line-height: 1.6; }

/* Flag cards */
.flag-item {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  padding: 14px;
  border-radius: 10px;
  background: var(--mid);
}

.flag-item__icon { font-size: 18px; flex-shrink: 0; }
.flag-item__type { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
.flag-item__desc { font-size: 13px; color: var(--sand); line-height: 1.6; }

/* Tile list */
.tile-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
}

.tile-row:last-child { border-bottom: none; }

.tile-row__name  { font-weight: 800; font-size: 14px; color: var(--sand); }
.tile-row__note  { font-size: 13px; color: var(--gold); margin-top: 2px; line-height: 1.5; }

/* Answer section */
.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.section-divider__line { flex: 1; height: 2px; background: var(--rust); border-radius: 1px; }

.section-divider__label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--rust);
  text-transform: uppercase;
  white-space: nowrap;
}

.answer-card { margin-bottom: 12px; }

.answer-card__meta { font-size: 11px; color: var(--border); margin-bottom: 4px; }
.answer-card__q    { font-weight: 700; font-size: 13px; color: var(--gold); margin-bottom: 9px; }
.answer-card__body { font-size: 14px; color: var(--sand); line-height: 1.85; white-space: pre-wrap; }

/* Footer */
.report-footer {
  margin-top: 32px;
  padding: 18px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  text-align: center;
}

.report-footer__copy {
  color: var(--border);
  font-size: 11px;
  margin-top: 8px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .content-wrap { padding: 20px 12px 40px; }
  .card { padding: 20px 16px; }
  .hero__title { font-size: 30px; }
  .q-title { font-size: 17px; }
  .report-title { font-size: 26px; }
  .q-nav .btn { font-size: 13px; padding: 12px 14px; }
}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ============================================================
   CONSTANTS & CONFIG
   ============================================================ */
const CFG = window.APP_CONFIG;

const LOGO_URL = "https://img1.wsimg.com/isteam/ip/24c22cb3-fef9-4b59-9955-fb4483f9ade0/915%20Gypsy.png/:/rs=w:260,h:260,cg:true,m/cr=w:260,h:260";

const AT_FIELDS = {

async function callClaude(prompt, maxTokens = 900) {
  // Calls our Netlify serverless function — no API key in the browser
  const response = await fetch(CFG.CLAUDE_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Claude API error: ${response.status}`);
  }

  const data = await response.json();
  return (data.content?.map(b => b.text || "").join("") || "")
    .replace(/```json|```/g, "").trim();
}
}
  
function safeJsonParse(maybeJsonText) {
  if (!maybeJsonText) throw new Error("Empty response from Claude");

  let t = String(maybeJsonText)
    .replace(/```json|```/g, "")
    .trim();

  const start = t.indexOf("{");
  const end = t.lastIndexOf("}");
  if (start === -1 || end === -1 || end <= start) {
    throw new Error("No JSON object found in Claude response");
  }

  t = t.slice(start, end + 1);
  return JSON.parse(t);
}

async function tailorQuestion(base, subs, industry, bizType, qNum) {
  try {
    const raw = await callClaude(
      `Rewrite this procurement interview question for a ${industry} ${bizType} business. ` +
      `Keep the same intent but use language specific to their trade and industry context. ` +
      `Return ONLY valid JSON — no extra text:\n` +
      `{"main":"rewritten question here","subs":["rewritten sub 1","rewritten sub 2"]}\n\n` +
      `Original Q${qNum}: ${base}\n` +
      `Original subs: ${subs.join(" | ")}`
    );
   const parsed = safeJsonParse(raw);
    if (parsed.main && Array.isArray(parsed.subs)) return parsed;
    return { main: base, subs };
  } catch {
    return { main: base, subs };
  }
}

async function submitToAirtable(biz, social, answers, report) {
  // Calls our Netlify serverless function — no API key in the browser
  const secAnswers = {};
  SECTIONS.forEach(sec => {
    const key = SEC_FIELD[sec.id];
    const lines = sec.questions
      .map(q => answers[q.id] ? `Q${q.id} — ${q.base}\n${answers[q.id]}` : null)
      .filter(Boolean);
    if (lines.length) secAnswers[key] = lines.join("\n\n─────\n\n");
  });

  const fields = {
    [AT_FIELDS.name]:        biz.name,
    [AT_FIELDS.industry]:    biz.industry,
    [AT_FIELDS.bizType]:     biz.bizType,
    [AT_FIELDS.date]:        new Date().toISOString().split("T")[0],
    [AT_FIELDS.score]:       report.proposalReadiness?.score || 0,
    [AT_FIELDS.canDo]:       report.canDo?.map(c => `✅ ${c.item}\n${c.evidence}`).join("\n\n") || "",
    [AT_FIELDS.cannotDo]:    report.cannotDo?.map(c => `🚫 ${c.item}\n${c.reason}`).join("\n\n") || "",
    [AT_FIELDS.conditional]: report.conditional?.map(c => `⚠️ ${c.item}\nOnly if: ${c.condition}`).join("\n\n") || "",
    [AT_FIELDS.flags]:       report.flags?.map(f => `[${f.type.toUpperCase()}] ${f.description}`).join("\n\n") || "",
    [AT_FIELDS.tiles]:       report.tileMapping?.map(t => `${(t.status||"").toUpperCase()} — ${t.tile}: ${t.note}`).join("\n") || "",
  };

  const socialFields = ["website","linkedin","facebook","instagram","tiktok","youtube","other"];
  socialFields.forEach(k => { if (social[k]) fields[AT_FIELDS[k]] = social[k]; });
  Object.entries(secAnswers).forEach(([key, val]) => { fields[AT_FIELDS[key]] = val; });

  const res = await fetch(CFG.AIRTABLE_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ fields })
  });

  return res.ok;
}

/* ============================================================
   SPEECH RECOGNITION HOOK
   ============================================================ */
function useVoice(onFinal) {
  const [isOn, setIsOn] = useState(false);
  const [interim, setInterim] = useState("");
  const recRef = useRef(null);
  const supported = typeof window !== "undefined" &&
    !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  const start = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = "en-US";
    recRef.current = rec;

    rec.onresult = e => {
      let final = "", inter = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        e.results[i].isFinal ? (final += t + " ") : (inter += t);
      }
      if (final) onFinal(final);
      setInterim(inter);
    };

    rec.onerror = e => { console.warn("Speech error:", e.error); stop(); };
    rec.onend = () => { setIsOn(false); setInterim(""); };
    rec.start();
    setIsOn(true);
  }, [onFinal]);

  const stop = useCallback(() => {
    recRef.current?.stop();
    setIsOn(false);
    setInterim("");
  }, []);

  return { isOn, interim, start, stop, supported };
}

                <span>{s}</span>
              </div>
            ))}
          </div>

          {/* Voice recorder */}
          <div className="voice-center">
            {isOn ? (
              <div>
                <div className="pulse-ring">
                  <div className="pulse-ring__ring" />
                  <div className="pulse-ring__ring" />
                  <div className="pulse-ring__core">🎙️</div>
                </div>
                <p className="listening-label">Listening… speak naturally</p>
                {interim && <p className="interim-text">{interim}</p>}
                <button
                  className="btn btn--secondary btn--pill btn--sm"
                  onClick={stop}
                >
                  ⏹ Stop Recording
                </button>
              </div>
            ) : (
              <div>
                {supported ? (
                  <button
                    className={`mic-btn ${hasAnswer ? "mic-btn--has-answer" : "mic-btn--idle"}`}
                    onClick={start}
                  >
                    🎙️ {hasAnswer ? "Add More" : "Tap to Speak"}
                  </button>
                ) : (
                  <p style={{ color: "var(--gold)", fontSize: 13 }}>
                    ⚠️ Voice not supported in this browser — please type your answer below.
                  </p>
                )}
                <div className="type-toggle-wrap">
                  <button
                    style={{ background: "none", border: "none", color: "var(--border)", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}
                    onClick={() => setShowTypeArea(!showTypeArea)}
                  >
                    {showTypeArea ? "Hide keyboard" : "Prefer to type?"}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Text area */}
          {(showTypeArea || hasAnswer) && (
            <div style={{ marginBottom: 20 }}>
              <div className="q-response-label">
                {hasAnswer ? "Your response (edit if needed):" : "Type your answer:"}
              </div>
              <textarea
                className="textarea"
                placeholder="Speak or type here…"
                value={answer || ""}
                onChange={e => {
                  textRef.current = e.target.value;
                  onChange(e.target.value);
                }}
              />
            </div>
          )}

          {/* Navigation */}
          <div className="q-nav">
            {qi > 0 && (
              <button className="btn btn--secondary" onClick={onBack}>
                ← Back
              </button>
            )}
            <button
              className="btn btn--primary"
              disabled={!hasAnswer}
              onClick={onNext}
              style={{ flex: qi > 0 ? undefined : "1 1 100%" }}
            >
              {qi === total - 1 ? "Submit & Generate Report →" : "Next Question →"}
            </button>
          </div>

          {/* Doc tags */}
          <div className="doc-tags">
            <div className="doc-tags__label">Feeds into proposal documents:</div>
            <div className="doc-tags__list">
              {question.docs.map(d => (
                <span key={d} className="chip">{d}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   LOADING SCREEN
   ============================================================ */
function LoadingScreen({ message }) {
  return (
    <div className="page">
      <Header />
      <div className="loading-screen">
        <div className="loading-logo-wrap">
          <Logo size={56} />
        </div>
        <div className="spinner" />
        <p className="loading-msg">{message}</p>
      </div>
    </div>
  );
}

/* ============================================================
   REPORT SCREEN
   ============================================================ */
function ReportScreen({ report, biz, social, answers, submitted }) {
  const [activeTab, setActiveTab] = useState("summary");
  const score = report.proposalReadiness?.score || 0;
  const scoreColor = score >= 7 ? "var(--rust)" : score >= 4 ? "var(--gold)" : "var(--danger)";

  function copyReport() {
    let out = `915 GYPSY LLC — PROCUREMENT CAPABILITY DUMP™\n${"═".repeat(52)}\n`;
    out += `Company: ${biz.name}\nIndustry: ${biz.industry}\nType: ${biz.bizType}\n`;
    out += `Date: ${new Date().toLocaleDateString()}\n`;
    if (social.website) out += `Website: ${social.website}\n`;
    out += `\nPROPOSAL READINESS SCORE: ${score}/10\n\n`;
    out += `ASSESSMENT\n${report.proposalReadiness?.summary}\n\n`;
    out += `CAN DO\n${report.canDo?.map(c => `• ${c.item}\n  ${c.evidence}`).join("\n\n")}\n\n`;
    out += `CANNOT DO\n${report.cannotDo?.map(c => `• ${c.item}\n  ${c.reason}`).join("\n\n")}\n\n`;
    out += `CONDITIONAL\n${report.conditional?.map(c => `• ${c.item}\n  Only if: ${c.condition}`).join("\n\n")}\n\n`;
    out += `FLAGS\n${report.flags?.map(f => `[${f.type.toUpperCase()}] ${f.description}`).join("\n")}\n\n`;
    out += `TILE READINESS\n${report.tileMapping?.map(t => `${(t.status||"").toUpperCase().padEnd(12)} ${t.tile}: ${t.note}`).join("\n")}\n\n`;
    out += `FULL ANSWERS\n${"─".repeat(44)}\n`;
    SECTIONS.forEach(sec => {
      out += `\nSECTION ${sec.id}: ${sec.title.toUpperCase()}\n`;
      sec.questions.forEach(q => {
        if (answers[q.id]) out += `\nQ${q.id}: ${q.base}\n${answers[q.id]}\n`;
      });
    });
    out += `\n${"═".repeat(52)}\n© 915 Gypsy LLC · Procurement Capability Dump™ · All rights reserved`;
    navigator.clipboard.writeText(out).catch(() => {});
    alert("Full report copied to clipboard!");
  }

  const tabs = [
    { id: "summary",      label: "📊 Summary" },
    { id: "capabilities", label: "✅ Capabilities" },
    { id: "tiles",        label: "📁 Tile Readiness" },
    { id: "answers",      label: "📝 Full Answers" },
  ];

  const tileStatusClass = s => {
    if (s === "ready")      return "badge--ready";
    if (s === "needs work") return "badge--needs";
    return "badge--missing";
  };

  const flagColor = type => {
    if (type === "risk")        return "var(--danger)";
    if (type === "gap")         return "var(--gold)";
    if (type === "opportunity") return "var(--rust)";
    return "var(--gold)";
  };

  const flagIcon = type => {
    if (type === "risk")        return "🚨";
    if (type === "gap")         return "⚠️";
    if (type === "opportunity") return "💡";
    return "📌";
  };

  return (
    <div className="page">
      <Header bizName={biz.name} />
      <div className="content-wrap content-wrap--wide">

        {/* Status banner */}
        {submitted ? (
          <div className="alert alert--success">
            <span className="alert__icon">✅</span>
            <div>
              <div className="alert__title">Successfully submitted to 915 Gypsy</div>
              <div className="alert__body">Jesse will review your Capability Dump and be in touch.</div>
            </div>
          </div>
        ) : (
          <div className="alert alert--warn">
            <span className="alert__icon">⚠️</span>
            <div className="alert__title">
              Use the Copy Report button below to save your results.
            </div>
          </div>
        )}

        {/* Report hero */}
        <div className="report-hero fade-up">
          <div style={{ width: 50, height: 3, background: "var(--rust)", margin: "0 auto 18px", borderRadius: 2 }} />
          <h1 className="report-title">Capability Summary Report</h1>
          <p className="report-meta">{biz.name} · {biz.industry} · {biz.bizType}</p>
          <div className="score-badge" style={{ border: `2px solid ${scoreColor}` }}>
            <span className="score-text" style={{ color: scoreColor }}>
              Proposal Readiness: {score}/10
            </span>
          </div>
          <div>
            <button className="btn btn--ghost btn--sm" onClick={copyReport}>
              📋 Copy Full Report
            </button>
          </div>
        </div>

        {/* Tabs */}
        <div className="report-tabs">
          {tabs.map(t => (
            <button
              key={t.id}
              className={`tab-btn ${activeTab === t.id ? "tab-btn--active" : "tab-btn--inactive"}`}
              onClick={() => setActiveTab(t.id)}
            >
              {t.label}
            </button>
          ))}
        </div>

        {/* TAB: Summary */}
        {activeTab === "summary" && (
          <div style={{ display: "grid", gap: 16 }}>
            <div className="card fade-up">
              <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Assessment</h3>
              <p style={{ color: "var(--gold)", fontSize: 14, lineHeight: 1.9, margin: 0 }}>
                {report.proposalReadiness?.summary}
              </p>
            </div>

            {report.flags?.length > 0 && (
              <div className="card fade-up" style={{ animationDelay: "0.1s" }}>
                <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 14 }}>Flags & Findings</h3>
                {report.flags.map((f, i) => (
                  <div key={i} className="flag-item" style={{ borderLeft: `3px solid ${flagColor(f.type)}` }}>
                    <span className="flag-item__icon">{flagIcon(f.type)}</span>
                    <div>
                      <div className="flag-item__type" style={{ color: flagColor(f.type) }}>{f.type}</div>
                      <p className="flag-item__desc">{f.description}</p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* TAB: Capabilities */}
        {activeTab === "capabilities" && (
          <div style={{ display: "grid", gap: 16 }}>
            {[
              { label: "✅ CAN DO",     items: report.canDo,       accent: "var(--rust)",   sub: c => c.evidence },
              { label: "🚫 CANNOT DO",  items: report.cannotDo,    accent: "var(--danger)", sub: c => c.reason },
              { label: "⚠️ CONDITIONAL",items: report.conditional, accent: "var(--gold)",   sub: c => `Only if: ${c.condition}` },
            ].map(({ label, items, accent, sub }) => (
              <div key={label} className="card" style={{ borderLeft: `4px solid ${accent}` }}>
                <h3 style={{ color: "var(--sand)", fontWeight: 900, fontSize: 15, marginBottom: 16 }}>{label}</h3>
                {items?.length ? items.map((c, i) => (
                  <div key={i} className="cap-item">
                    <div className="cap-item__title">{c.item}</div>
                    <div className="cap-item__sub">{sub(c)}</div>
                  </div>
                )) : (
                  <div style={{ color: "var(--border)", fontSize: 13 }}>None identified</div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* TAB: Tile Readiness */}
        {activeTab === "tiles" && (
          <div className="card fade-up">
            <h3 style={{ color: "var(--sand)", fontWeight: 800, fontSize: 15, marginBottom: 18 }}>Proposal Tile Readiness</h3>
            {report.tileMapping?.map((t, i) => (
              <div key={i} className="tile-row">
                <span className={`badge ${tileStatusClass(t.status)}`} style={{ flexShrink: 0, marginTop: 2 }}>
                  {(t.status || "unknown").toUpperCase()}
                </span>
                <div>
                  <div className="tile-row__name">{t.tile}</div>
                  <div className="tile-row__note">{t.note}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TAB: Full Answers */}
        {activeTab === "answers" && (
          <div>
            {SECTIONS.map(sec => {
              const hasAnswers = sec.questions.some(q => answers[q.id]);
              if (!hasAnswers) return null;
              return (
                <div key={sec.id} style={{ marginBottom: 28 }}>
                  <div className="section-divider">
                    <div className="section-divider__line" />
                    <span className="section-divider__label">Section {sec.id}: {sec.title}</span>
                    <div className="section-divider__line" />
                  </div>
                  {sec.questions.map(q => answers[q.id] && (
                    <div key={q.id} className="card answer-card">
                      <div className="answer-card__meta">{q.tag} Q{q.id} — {q.tagLabel}</div>
                      <div className="answer-card__q">{q.base}</div>
                      <div className="answer-card__body">{answers[q.id]}</div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* Footer */}
        <div className="report-footer">
          <Logo size={30} />
          <p className="report-footer__copy">
            © 915 Gypsy LLC · Procurement Capability Dump™ is a proprietary diagnostic tool · All rights reserved
          </p>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP COMPONENT
   ============================================================ */
function App() {
  const [stage, setStage] = useState("onboard");
  const [biz, setBiz] = useState(null);
  const [social, setSocial] = useState({});
  const [tailored, setTailored] = useState({});
  const [answers, setAnswers] = useState({});
  const [qi, setQi] = useState(0);
  const [report, setReport] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [loadMsg, setLoadMsg] = useState("");

  async function handleStart(bizInfo, socialInfo) {
    setBiz(bizInfo);
    setSocial(socialInfo);
    setStage("tailoring");
    setLoadMsg(`Tailoring your ${ALL_Q.length} questions for a ${bizInfo.industry} company…`);

    const result = {};
    for (const q of ALL_Q) {
      result[q.id] = await tailorQuestion(q.base, q.subs, bizInfo.industry, bizInfo.bizType, q.id);
    }
    setTailored(result);
    setStage("interview");
  }

  async function handleNext() {
    if (qi < ALL_Q.length - 1) {
      setQi(qi + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    setStage("generating");
    setLoadMsg("Analyzing your responses and building your Capability Summary Report…");

    try {
      const r = await buildReport(answers, biz);
      setReport(r);

      setLoadMsg("Submitting your report to 915 Gypsy…");
      try {
        const ok = await submitToAirtable(biz, social, answers, r);
        setSubmitted(ok);
      } catch {
        setSubmitted(false);
      }

      setStage("report");
    } catch (err) {
      console.error("Report generation error:", err);
      setReport({
        canDo: [],
        cannotDo: [],
        conditional: [],
        flags: [{
          type: "gap",
          description: `Report generation failed: ${err.message || "Unknown error"}. Please copy your answers manually and contact 915 Gypsy.`
        }],
        proposalReadiness: { score: 0, summary: "Error generating report. Please contact 915 Gypsy with your answers." },
        tileMapping: []
      });
      setSubmitted(false);
      setStage("report");
    }
  }

  function handleBack() {
    if (qi > 0) {
      setQi(qi - 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  function handleAnswerChange(val) {
    setAnswers(prev => ({ ...prev, [ALL_Q[qi].id]: val }));
  }

  const curQ = ALL_Q[qi];

  switch (stage) {
    case "onboard":
      return <Onboarding onStart={handleStart} />;

    case "tailoring":
      return <LoadingScreen message={loadMsg} />;

    case "interview":
      return curQ ? (
        <QuestionScreen
          question={curQ}
          tailored={tailored[curQ.id]}
          answer={answers[curQ.id]}
          onChange={handleAnswerChange}
          onNext={handleNext}
          onBack={handleBack}
          qi={qi}
          total={ALL_Q.length}
        />
      ) : null;

    case "generating":
      return <LoadingScreen message={loadMsg} />;

    case "report":
      return report ? (
        <ReportScreen
          report={report}
          biz={biz}
          social={social}
          answers={answers}
          submitted={submitted}
        />
      ) : null;

    default:
      return null;
  }
}

/* ============================================================
   MOUNT
   ============================================================ */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
