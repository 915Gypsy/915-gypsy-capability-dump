const ALL_Q=SECTIONS.flatMap(s=>s.questions);

function calcScore(answers){
  const total=ALL_Q.length;
  const answered=Object.values(answers).filter(a=>a&&a.trim().length>0).length;
  const avgLen=answered===0?0:Object.values(answers).filter(a=>a&&a.trim().length>0).reduce((s,a)=>s+a.trim().length,0)/answered;
  const completionScore=(answered/total)*6; // max 6 pts from completion
  const qualityScore=Math.min(4,avgLen/80); // max 4 pts from avg length (~320+ chars = full 4)
  return Math.min(10,Math.round((completionScore+qualityScore)*10)/10);
}

async function tailorQ(base,subs,industry,bizType,num){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,
        messages:[{role:"user",content:`Rewrite this procurement interview question for a ${industry} ${bizType} business. Keep same intent, make language specific to their trade. Return ONLY JSON: {"main":"...","subs":["...","..."]}
Q${num}: ${base}
Subs: ${subs.join(" | ")}`}]})
    });
    const d=await r.json();
    const txt=(d.content?.map(b=>b.text||"").join("")||"").replace(/```json|```/g,"").trim();
    return JSON.parse(txt);
  }catch{return{main:base,subs};}
}

async function submitToAirtable(biz,social,answers,score){
  const secAnswers={};
  SECTIONS.forEach(sec=>{
    const key=SEC_FIELD[sec.id];
    const lines=sec.questions.map(q=>answers[q.id]?`Q${q.id} — ${q.base}\n${answers[q.id]}`:null).filter(Boolean);
    if(lines.length)secAnswers[key]=lines.join("\n\n─────\n\n");
  });
  const fields={
    [AT_FIELDS.name]:biz.name,[AT_FIELDS.industry]:biz.industry,[AT_FIELDS.bizType]:biz.bizType,
    [AT_FIELDS.date]:new Date().toISOString().split("T")[0],[AT_FIELDS.score]:score
  };
  if(social.website)fields[AT_FIELDS.website]=social.website;
  if(social.linkedin)fields[AT_FIELDS.linkedin]=social.linkedin;
  if(social.facebook)fields[AT_FIELDS.facebook]=social.facebook;
  if(social.instagram)fields[AT_FIELDS.instagram]=social.instagram;
  if(social.tiktok)fields[AT_FIELDS.tiktok]=social.tiktok;
  if(social.youtube)fields[AT_FIELDS.youtube]=social.youtube;
  if(social.other)fields[AT_FIELDS.other]=social.other;
  Object.entries(secAnswers).forEach(([k,v])=>{fields[AT_FIELDS[k]]=v;});
  const res=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer YOUR_AIRTABLE_API_KEY"},
    body:JSON.stringify({fields})
  });
  return res.ok;
}

function useVoice(onFinal){
  const[on,setOn]=useState(false);
  const[interim,setInterim]=useState("");
  const ref=useRef(null);
  const supported=typeof window!=="undefined"&&!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  function start(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang="en-US";
    ref.current=r;
    r.onresult=e=>{
      let fin="",inter="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        e.results[i].isFinal?fin+=t+" ":inter+=t;
      }
      if(fin)onFinal(fin);
      setInterim(inter);
    };
    r.onend=()=>{setOn(false);setInterim("");};
    r.start();setOn(true);
  }
  function stop(){ref.current?.stop();setOn(false);setInterim("");}
  return{on,interim,start,stop,supported};
}

function Question({question,tailored,answer,onChange,onNext,onBack,qi,total,isLast}){
  const q=tailored||{main:question.base,subs:question.subs};
  const[showType,setShowType]=useState(false);
  const textRef=useRef(answer||"");
  const{on,interim,start,stop,supported}=useVoice(t=>{
    textRef.current=(textRef.current+" "+t).trim();
    onChange(textRef.current);
  });
  useEffect(()=>{textRef.current=answer||"";},[answer]);
  const has=(answer||"").trim().length>0;
  const pct=Math.round(((qi+1)/total)*100);
  const sec=SECTIONS.find(s=>s.questions.some(sq=>sq.id===question.id));

  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header/>
      <div style={{flex:1,padding:"24px 16px",maxWidth:700,margin:"0 auto",width:"100%"}}>

          <div style={{display:"flex",justifyContent:"space-between",color:B.gold,fontSize:12,marginBottom:6,fontWeight:600}}>
            <span>{sec?.title}</span>
            <span>Q{question.id} of {total} · {pct}%</span>
          </div>
          <div style={{background:B.mid,borderRadius:99,height:6}}>
            <div style={{background:B.rust,width:`${pct}%`,height:6,borderRadius:99,transition:"width .4s"}}/>
          </div>
        </div>

        <div style={cardS}>
          {/* Tag */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:18}}>{question.tag}</span>
            <span style={{fontSize:11,fontWeight:800,letterSpacing:1,color:B.gold,textTransform:"uppercase"}}>{question.tagLabel}</span>
            <span style={{marginLeft:"auto",fontSize:11,color:B.border,fontWeight:600}}>Answer all 3 parts</span>
          </div>

          {/* 3-part question block */}
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:22}}>
            {/* Part 1 */}
            <div style={{background:`${B.rust}18`,border:`1px solid ${B.rust}`,borderRadius:10,padding:"12px 16px"}}>
              <div style={{fontSize:10,fontWeight:900,letterSpacing:1.5,color:B.rust,textTransform:"uppercase",marginBottom:6}}>Part 1 — Main Question</div>
              <div style={{color:B.sand,fontSize:17,fontWeight:800,lineHeight:1.55}}>{q.main}</div>
            </div>
            {/* Part 2 */}
            <div style={{background:B.mid,border:`1px solid ${B.border}`,borderRadius:10,padding:"12px 16px"}}>
              <div style={{fontSize:10,fontWeight:900,letterSpacing:1.5,color:B.gold,textTransform:"uppercase",marginBottom:6}}>Part 2 — Follow-Up</div>
              <div style={{display:"flex",gap:8,color:B.sand,fontSize:14,lineHeight:1.6}}>
                <span style={{color:B.rust,fontWeight:900,flexShrink:0}}>→</span>
                <span>{q.subs[0]}</span>
              </div>
            </div>
            {/* Part 3 */}
            <div style={{background:B.mid,border:`1px solid ${B.border}`,borderRadius:10,padding:"12px 16px"}}>
              <div style={{fontSize:10,fontWeight:900,letterSpacing:1.5,color:B.gold,textTransform:"uppercase",marginBottom:6}}>Part 3 — Follow-Up</div>
              <div style={{display:"flex",gap:8,color:B.sand,fontSize:14,lineHeight:1.6}}>
                <span style={{color:B.rust,fontWeight:900,flexShrink:0}}>→</span>
                <span>{q.subs[1]}</span>
              </div>
            </div>
          </div>

          {/* Voice */}
          <div style={{textAlign:"center",marginBottom:18}}>
            {on?(
              <div>
                <div style={{position:"relative",width:80,height:80,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{position:"absolute",width:80,height:80,borderRadius:"50%",background:`${B.rust}22`,animation:"pulse 1.5s ease-out infinite"}}/>
                  <div style={{position:"absolute",width:60,height:60,borderRadius:"50%",background:`${B.rust}33`,animation:"pulse 1.5s ease-out .35s infinite"}}/>
                  <div style={{width:48,height:48,borderRadius:"50%",background:B.rust,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,fontSize:22}}>🎙️</div>
                </div>
                <p style={{color:B.rust,fontWeight:800,fontSize:13,margin:"0 0 6px"}}>Listening… cover all 3 parts</p>
                {interim&&<p style={{color:B.gold,fontSize:12,fontStyle:"italic",maxWidth:400,margin:"0 auto 10px",lineHeight:1.5}}>{interim}</p>}
                <button onClick={stop} style={{padding:"8px 24px",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:99,fontWeight:700,fontSize:13,cursor:"pointer"}}>⏹ Stop Recording</button>
              </div>
            ):(
              <div>
                {supported?(
                  <button onClick={start} style={{padding:"14px 40px",background:has?B.mid:B.rust,color:has?B.rust:B.white,border:has?`2px solid ${B.rust}`:"none",borderRadius:99,fontWeight:900,fontSize:16,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:10}}>
                    🎙️ {has?"Add More":"Tap to Speak — Cover All 3 Parts"}
                  </button>
                ):(
                  <p style={{color:B.gold,fontSize:13}}>⚠️ Voice not supported — please type below.</p>
                )}
                <div style={{marginTop:8}}>
                  <button onClick={()=>setShowType(!showType)} style={{background:"none",border:"none",color:B.border,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
                    {showType?"Hide keyboard":"Prefer to type?"}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Text area */}
          {(showType||has)&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:B.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                {has?"Your response — make sure you've covered all 3 parts:":"Type your answer (cover all 3 parts):"}
              </div>
              <textarea
                style={{width:"100%",minHeight:130,background:B.mid,border:`1px solid ${B.border}`,borderRadius:8,padding:12,fontSize:14,fontFamily:"inherit",color:B.sand,resize:"vertical",boxSizing:"border-box",lineHeight:1.7}}
                placeholder="Cover Part 1, Part 2, and Part 3 in your answer…"
                value={answer||""}
                onChange={e=>{textRef.current=e.target.value;onChange(e.target.value);}}
              />
            </div>
          )}

          {/* Nav buttons — always visible */}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            {qi>0&&(
              <button onClick={onBack} style={{flex:1,padding:"12px 0",background:B.mid,color:B.sand,border:`1px solid ${B.border}`,borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>← Back</button>
            )}
            <button
              onClick={onNext}
              style={{flex:2,padding:"13px 24px",background:has?B.rust:B.mid,color:has?B.white:B.border,border:has?"none":`1px solid ${B.border}`,borderRadius:8,fontWeight:800,fontSize:14,cursor:"pointer",transition:"all .2s"}}
            >
              {isLast?"Submit to 915 Gypsy →":"Next Question →"}
              {!has&&<span style={{fontSize:11,display:"block",fontWeight:400,marginTop:2,color:B.border}}>(answer optional — tap to skip)</span>}
            </button>
          </div>

          {/* Docs */}
          <div style={{marginTop:16,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
            <div style={{fontSize:11,color:B.border,marginBottom:5}}>Feeds into proposal documents:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {question.docs.map(d=><span key={d} style={{background:B.mid,color:B.gold,fontSize:11,padding:"3px 10px",borderRadius:99,border:`1px solid ${B.border}`}}>{d}</span>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Completion({biz,score,submitted}){
  const scoreCol=score>=7?B.greenBright:score>=5?B.gold:B.rust;
  const scoreMsg=score>=8?"Your company is well-positioned. 915 Gypsy has strong material to work with.":score>=6?"Good foundation. A few areas will need more detail — 915 Gypsy will follow up.":score>=4?"Solid start. Some key areas need more depth before proposals can be built out.":"Early stage. 915 Gypsy will be in touch to gather more information in critical areas.";
  return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header bizName={biz.name}/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 16px"}}>
        <div style={{maxWidth:520,width:"100%",textAlign:"center",animation:"fadeIn .6s ease"}}>
          <Logo size={72}/>
          <div style={{width:60,height:3,background:B.rust,margin:"20px auto 24px",borderRadius:2}}/>

          {/* Submitted banner */}
          <div style={{background:"#1a3a0c",border:`1px solid #4a8a2a`,borderRadius:14,padding:"20px 24px",marginBottom:24}}>
            <div style={{fontSize:36,marginBottom:10}}>✅</div>
            <div style={{color:B.greenBright,fontWeight:900,fontSize:18,marginBottom:6}}>Submitted to 915 Gypsy</div>
            <div style={{color:"#6ab52a",fontSize:14,lineHeight:1.7}}>
              <strong>{biz.name}</strong> — your Capability Dump is in.<br/>
              Jesse and the team are processing your submission now.
            </div>
          </div>

          {/* Score card */}
          <div style={{background:B.card,border:`2px solid ${scoreCol}`,borderRadius:14,padding:"24px 28px",marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:1.5,color:B.gold,textTransform:"uppercase",marginBottom:10}}>Proposal Readiness Score</div>
            <div style={{fontSize:62,fontWeight:900,color:scoreCol,lineHeight:1,marginBottom:4}}>
              {score}<span style={{fontSize:28,color:B.border}}>/10</span>
            </div>
            <div style={{width:100,height:6,background:B.mid,borderRadius:99,margin:"14px auto",overflow:"hidden"}}>
              <div style={{height:6,background:scoreCol,width:`${score*10}%`,borderRadius:99,transition:"width 1s"}}/>
            </div>
            <p style={{color:B.sand,fontSize:14,lineHeight:1.7,margin:0}}>{scoreMsg}</p>
          </div>

          {/* What happens next */}
          <div style={{background:B.card,border:`1px solid ${B.border}`,borderRadius:14,padding:"20px 24px",marginBottom:20,textAlign:"left"}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:1.5,color:B.gold,textTransform:"uppercase",marginBottom:14}}>What Happens Next</div>
            {[
              {icon:"📥",text:"Your answers are being reviewed by 915 Gypsy"},
              {icon:"📋",text:"A capability profile will be built from your responses"},
              {icon:"📞",text:"Jesse will reach out if more detail is needed in any area"},
              {icon:"🚀",text:"Your first proposal-ready documents will be drafted"}
            ].map((item,i)=>(
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:i<3?12:0}}>
                <span style={{fontSize:18,flexShrink:0}}>{item.icon}</span>
                <span style={{color:B.sand,fontSize:14,lineHeight:1.6}}>{item.text}</span>
              </div>
            ))}
          </div>

          {!submitted&&(
            <div style={{background:B.mid,border:`1px solid ${B.gold}`,borderRadius:10,padding:14,marginBottom:16}}>
              <p style={{color:B.gold,fontSize:13,margin:0}}>⚠️ Note: Airtable submission encountered an issue, but your answers were recorded. Jesse will still receive your information.</p>
            </div>
          )}

          <div style={{padding:14,background:B.card,borderRadius:10,border:`1px solid ${B.border}`}}>
            <Logo size={24}/>
            <p style={{color:B.border,fontSize:11,margin:"8px 0 0"}}>© 915 Gypsy LLC · Procurement Capability Dump™ is a proprietary diagnostic tool · All rights reserved</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[stage,setStage]=useState("onboard");
  const[biz,setBiz]=useState(null);
  const[social,setSocial]=useState({});
  const[tailored,setTailored]=useState({});
  const[answers,setAnswers]=useState({});
  const[qi,setQi]=useState(0);
  const[score,setScore]=useState(0);
  const[submitted,setSubmitted]=useState(false);
  const[loadMsg,setLoadMsg]=useState("");

  async function handleStart(bizInfo,socialInfo){
    setBiz(bizInfo);setSocial(socialInfo);
    setStage("tailoring");
    setLoadMsg(`Tailoring your 26 questions for a ${bizInfo.industry} ${bizInfo.bizType} company…`);
    const result={};
    for(const q of ALL_Q){
      result[q.id]=await tailorQ(q.base,q.subs,bizInfo.industry,bizInfo.bizType,q.id);
    }
    setTailored(result);
    setStage("interview");
  }

  async function handleNext(){
    if(qi<ALL_Q.length-1){setQi(qi+1);return;}
    // Last question — submit
    setStage("submitting");
    setLoadMsg("Calculating your readiness score and submitting to 915 Gypsy…");
    const s=calcScore(answers);
    setScore(s);
    try{
      const ok=await submitToAirtable(biz,social,answers,s);
      setSubmitted(ok);
    }catch{setSubmitted(false);}
    setStage("complete");
  }

  const curQ=ALL_Q[qi];

  if(stage==="onboard")return<Onboarding onStart={handleStart}/>;
  if(stage==="tailoring"||stage==="submitting")return(
    <div style={{minHeight:"100vh",background:B.bg,display:"flex",flexDirection:"column"}}>
      <Header/>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
        <div style={{width:44,height:44,border:`4px solid ${B.border}`,borderTop:`4px solid ${B.rust}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <p style={{color:B.sand,fontSize:15,textAlign:"center",maxWidth:340,lineHeight:1.8}}>{loadMsg}</p>
      </div>
    </div>
  );
  if(stage==="interview"&&curQ)return(
    <Question
      question={curQ}
      tailored={tailored[curQ.id]}
      answer={answers[curQ.id]}
      onChange={val=>setAnswers({...answers,[curQ.id]:val})}
      onNext={handleNext}
      onBack={()=>setQi(qi-1)}
      qi={qi}
      total={ALL_Q.length}
      isLast={qi===ALL_Q.length-1}
    />
  );
  if(stage==="complete")return<Completion biz={biz} score={score} submitted={submitted}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
